                      <BarChart data={tools} layout="vertical" margin={{top:0, right:6, bottom:0, left:4}}>
                        <XAxis type="number" stroke="transparent" tick={{fontSize:10, fill:'#5f6770'}}/>
                        <YAxis type="category" dataKey="name" stroke="transparent" tick={{fontSize:11, fill:'#9aa3ad'}} width={100}/>
                        <Tooltip {...TT}/>
                        <Bar dataKey="count" fill="#4cc2ff" radius={[0,4,4,0]} opacity={0.92}/>
                      </BarChart>
                    </ResponsiveContainer>
                  ) : <Empty msg="No tool calls yet"/>}
                </div>
              </div>
              {clients.length > 0 && (
                <div style={{marginTop:'14px'}}>
                  <Label>Active clients</Label>
                  <ResponsiveContainer width="100%" height={140}>
                    <BarChart data={clients} layout="vertical" margin={{top:6, right:6, bottom:0, left:4}}>
                      <XAxis type="number" stroke="transparent" tick={{fontSize:10, fill:'#5f6770'}}/>
                      <YAxis type="category" dataKey="name" stroke="transparent" tick={{fontSize:11, fill:'#9aa3ad'}} width={110}/>
                      <Tooltip {...TT}/>
                      <Bar dataKey="count" fill="#3ecf8e" radius={[0,4,4,0]} opacity={0.88}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              )}
            </Section>

            <Section
              icon={I.Server}
              tone={ab === tb && tb > 0 ? 'success' : 'warning'}
              title="Health"
              copy="Backend status, latency percentiles, and circuit breakers."
              meta={<Badge tone={ab === tb && tb > 0 ? 'success' : tb > 0 ? 'warning' : 'default'}>{ab}/{tb} healthy</Badge>}
            >
              <div className="ui-grid-4" style={{gap:'8px', marginBottom:'14px'}}>
                <MiniStat label="p50" value={fmtMs(rq.p50_ms)} sub="median"/>
                <MiniStat label="p99" value={fmtMs(rq.p99_ms)} sub="tail"/>
                <MiniStat label="Hits" value={fmt(cs.hits)} sub={`${fmt(cs.misses)} miss`}/>
                <MiniStat label="Up" value={`${ab}/${tb}`} sub="backends"/>
              </div>

              {health?.backends?.length > 0 ? (
                <div className="ui-list" style={{borderTop:'1px solid var(--border-subtle)'}}>
                  {health.backends.map(b => (
                    <div key={b.id} className="ui-list-item-flat" style={{padding:'10px 0'}}>
                      <div className="ui-row">
                        <HealthDot ok={b.healthy}/>
                        <div>
                          <p style={{fontSize:'13px', fontWeight:500}}>{b.id}</p>
                          <p className="ui-mono" style={{fontSize:'11px', color:'var(--text-subtle)', marginTop:'2px'}}>
                            {b.latency_ms != null ? Math.round(b.latency_ms)+'ms' : '—'}
                            {b.last_checked && ` · ${fmtTime(b.last_checked)}`}
                          </p>
                        </div>
                      </div>
                      <Badge tone={b.healthy ? 'success' : 'warning'}>{b.healthy ? 'healthy' : 'watch'}</Badge>
                    </div>
                  ))}
                </div>
              ) : <Empty msg="No backends configured"/>}

              {circuits.length > 0 && (
                <div style={{marginTop:'12px', paddingTop:'12px', borderTop:'1px solid var(--border-subtle)'}}>
                  <Label>Circuit breakers</Label>
                  <div className="ui-row" style={{marginTop:'6px'}}>
                    {circuits.map((cb, i) => (
                      <Chip key={i}>
                        <span style={{color:'var(--text)'}}>{cb.server_id}</span>
                        {cb.replica_index !== -1 && <span style={{color:'var(--text-subtle)'}}>#{cb.replica_index}</span>}
                        <Badge tone={cb.state === 'closed' ? 'success' : cb.state === 'open' ? 'danger' : 'warning'}>{cb.state}</Badge>
                      </Chip>
                    ))}
                  </div>
                </div>
              )}
            </Section>
          </div>
        </Page>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // VIEW · Logs
    // ════════════════════════════════════════════════════════════════════════
    function LogsView({ adminKey, tick }) {
      const LIMIT = 50;
      const [logs, setLogs]               = useState([]);
      const [total, setTotal]             = useState(0);
      const [offset, setOffset]           = useState(0);
      const [loading, setLoading]         = useState(true);
      const [err, setErr]                 = useState(null);
      const [serverF, setServerF]         = useState('');
      const [toolF, setToolF]             = useState('');
      const [statusF, setStatusF]         = useState('');
      const [trace, setTrace]             = useState(null);
      const [traceLoading, setTraceLoading] = useState(false);

      const fetchLogs = useCallback(async (off = 0) => {
        setLoading(true); setErr(null);
        try {
          let url = '/logs?limit=' + LIMIT + '&offset=' + off;
          if (serverF) url += '&server=' + encodeURIComponent(serverF);
          if (toolF)   url += '&tool=' + encodeURIComponent(toolF);
          if (statusF) url += '&status=' + encodeURIComponent(statusF);
          const d = await apiFetch(url, adminKey);
          if (off === 0) setLogs(d.logs || []); else setLogs(p => [...p, ...(d.logs || [])]);
          setTotal(d.count ?? 0); setOffset(off);
        } catch (e) { setErr(e.message); }
        setLoading(false);
      }, [adminKey, serverF, toolF, statusF]);

      useEffect(() => { fetchLogs(0); }, [adminKey, tick, serverF, toolF, statusF]);

      const openTrace = async (id) => {
        setTraceLoading(true);
        try { const d = await apiFetch('/logs/trace/' + encodeURIComponent(id), adminKey); setTrace(d); }
        catch (e) { console.error(e); }
        setTraceLoading(false);
      };

      const sv = (s) => s === 'success' ? 'success' : s === 'error' ? 'danger' : 'default';
      const cv = (cs) => !cs ? null : cs === 'HIT' ? 'primary' : 'default';

      const activeFilters = [
        serverF ? `Server: ${serverF}` : '',
        toolF   ? `Tool: ${toolF}`     : '',
        statusF ? `Status: ${statusF}` : '',
      ].filter(Boolean);
      const shownCount = Math.min(logs.length, total || logs.length);
      const windowLabel = logs.length === 0 ? '0' : `${offset + 1}-${offset + logs.length}`;

      return (
        <Page>
          <PageHeader
            kicker="Observe"
            kickerIcon={I.List}
            title="Request Logs"
            lede="Inspect recent gateway traffic, filter by server/tool/status, and open a trace to see the full request path."
            actions={<Button onClick={()=>fetchLogs(0)}><I.Refresh/> Refresh</Button>}
            badges={[
              <Badge key="t"  tone="default">{total} entries</Badge>,
              <Badge key="f"  tone={activeFilters.length > 0 ? 'primary' : 'default'}>{activeFilters.length > 0 ? `${activeFilters.length} active filter${activeFilters.length !== 1 ? 's' : ''}` : 'No active filters'}</Badge>,
              trace && <Badge key="tr" tone="success">Trace open</Badge>,
              loading && <Badge key="rf" tone="default">Refreshing…</Badge>,
            ].filter(Boolean)}
          />

          <ErrorMsg err={err}/>

          <Section
            icon={I.List}
            title="Requests"
            copy={`${shownCount} of ${total} · click a row to open the trace`}
            meta={
              <div className="ui-row">
                <div style={{minWidth:'180px'}}>
                  <Input icon={I.Server} type="text" value={serverF} onChange={e=>setServerF(e.target.value)} placeholder="Server"/>
                </div>
                <div style={{minWidth:'180px'}}>
                  <Input icon={I.Search} type="text" value={toolF} onChange={e=>setToolF(e.target.value)} placeholder="Tool"/>
                </div>
                <ToggleGroup
                  value={statusF}
                  onChange={setStatusF}
                  options={[{value:'', label:'All'}, {value:'success', label:'OK'}, {value:'error', label:'Err'}]}
                />
              </div>
            }
            flush
          >
            <div style={{overflowX:'auto'}}>
              <table className="ui-table" style={{minWidth:'760px'}}>
                <thead>
                  <tr>{['Time','Trace','Client','Server','Tool','Status','Duration','Cache'].map(h => <th key={h}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {logs.length === 0 && !loading ? (
                    <tr><td colSpan={8} style={{padding:0}}><Empty msg="No logs match your filters"/></td></tr>
                  ) : logs.map((l, i) => (
                    <tr key={i} className="ui-row-clickable" onClick={()=>openTrace(l.trace_id)}>
                      <td className="ui-mono" style={{fontSize:'12px', color:'var(--text-subtle)', whiteSpace:'nowrap'}}>{fmtTime(l.timestamp)}</td>
                      <td><span className="ui-mono" style={{fontSize:'11px', color:'var(--accent)'}} title={l.trace_id}>{l.trace_id ? l.trace_id.slice(0, 8) + '…' : '—'}</span></td>
                      <td className="ui-mono ui-truncate" style={{fontSize:'11px', color:'var(--text-subtle)', maxWidth:'120px'}}>{l.client_id || '—'}</td>
                      <td style={{fontSize:'12px', color:'var(--text-muted)'}}>{l.server_id || '—'}</td>
                      <td style={{fontSize:'13px', fontWeight:500}}>{l.tool_name || l.method}</td>
                      <td><Badge tone={sv(l.status)}>{l.status}</Badge></td>
                      <td className={cn('ui-mono', durTone(l.duration_ms))} style={{fontSize:'12px', textAlign:'right'}}>{fmtMs(l.duration_ms)}</td>
                      <td>{l.cache_status && <Badge tone={cv(l.cache_status)}>{l.cache_status}</Badge>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {loading && <Spinner/>}
            {!loading && logs.length < total && (
              <div style={{padding:'var(--sp-3)', display:'flex', justifyContent:'center', borderTop:'1px solid var(--border-subtle)'}}>
                <Button onClick={()=>fetchLogs(offset + LIMIT)}>Load more — {total - logs.length} remaining</Button>
              </div>
            )}
          </Section>

          <Dialog
            open={Boolean(trace || traceLoading)}
            onClose={()=>setTrace(null)}
            title="Trace Details"
            sub={trace?.trace_id}
          >
            {traceLoading && <Spinner/>}
            {trace?.logs?.map((l, i) => (
              <div key={i} className="ui-trace">
                <div className="ui-trace-head">
                  <div className="ui-row">
                    <Badge tone={l.status === 'success' ? 'success' : 'danger'}>{l.status}</Badge>
                    <span style={{fontWeight:500, fontSize:'13.5px'}}>{l.tool_name || l.method}</span>
                  </div>
                  <span className="ui-mono" style={{fontSize:'12px', color:'var(--text-subtle)'}}>{fmtMs(l.duration_ms)}</span>
                </div>
                <div className="ui-kv-grid">
                  <span>Server: <span style={{color:'var(--text)'}}>{l.server_id}</span></span>
                  <span>Client: <span style={{color:'var(--text)'}}>{l.client_id || '—'}</span></span>
                  <span>Time: <span style={{color:'var(--text)'}}>{fmtDate(l.timestamp)}</span></span>
                  {l.cache_status && <span>Cache: <span style={{color:'var(--text)'}}>{l.cache_status}</span></span>}
                  {l.error_message && <span style={{gridColumn:'1 / -1', color:'var(--danger)', marginTop:'4px'}}>Error: {l.error_message}</span>}
                </div>
              </div>
            ))}
            {trace && (!trace.logs || trace.logs.length === 0) && <Empty msg="No entries for this trace"/>}
          </Dialog>
        </Page>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // VIEW · Servers & Cache
    // ════════════════════════════════════════════════════════════════════════
    function ServersCacheView({ adminKey, tick }) {
      const [servers, setServers]     = useState([]);
      const [circuits, setCircuits]   = useState({});
      const [cs, setCs]               = useState(null);
      const [topTools, setTopTools]   = useState([]);
      const [loading, setLoading]     = useState(true);
      const [err, setErr]             = useState(null);
      const [expanded, setExpanded]   = useState({});
      const [flushing, setFlushing]   = useState('');
      const [msg, setMsg]             = useState('');
      const [confirm, setConfirm]     = useState('');
      const [reloadKey, setReloadKey] = useState(0);

      useEffect(() => {
        let alive = true;
        async function load() {
          setLoading(true); setErr(null);
          const unavailable = [];
          try {
            const [serversRes, circuitsRes, cacheRes, logsRes] = await Promise.allSettled([
              apiFetch('/servers', adminKey),
              apiFetch('/circuits', adminKey),
              apiFetch('/cache/stats', adminKey),
              apiFetch('/logs?limit=500', adminKey),
            ]);
            if (!alive) return;

            if (serversRes.status === 'fulfilled') setServers(serversRes.value.servers || []);
            else { setServers([]); unavailable.push('servers'); }

            if (circuitsRes.status === 'fulfilled') {
              const map = {};
              for (const cb of (circuitsRes.value.circuits || [])) {
                if (!map[cb.server_id]) map[cb.server_id] = [];
                map[cb.server_id].push(cb);
              }
              setCircuits(map);
            } else { setCircuits({}); unavailable.push('circuit breakers'); }

            if (cacheRes.status === 'fulfilled') setCs(cacheRes.value.l1 || cacheRes.value || null);
            else { setCs(null); unavailable.push('cache stats'); }

            if (logsRes.status === 'fulfilled') {
              const hits = {};
              for (const l of (logsRes.value.logs || [])) {
                if (l.cache_status === 'HIT' && l.tool_name) hits[l.tool_name] = (hits[l.tool_name] || 0) + 1;
              }
              setTopTools(Object.entries(hits).sort((a, b) => b[1] - a[1]).slice(0, 10).map(([name, count]) => ({ name, count })));
            } else { setTopTools([]); unavailable.push('cache activity'); }

            setErr(unavailable.length > 0 ? 'Partial data unavailable: ' + unavailable.join(', ') + '.' : null);
          } catch (e) { if (alive) setErr(e.message); }
          if (alive) setLoading(false);
        }
        load();
        return () => { alive = false; };
      }, [adminKey, tick, reloadKey]);

      const toggle = (id) => setExpanded(p => ({ ...p, [id]: !p[id] }));
      const flush = async (id) => {
        if (confirm !== id) { setConfirm(id); return; }
        setFlushing(id); setMsg(''); setErr(null); setConfirm('');
        try {
          const d = await apiDelete('/cache/server/' + encodeURIComponent(id), adminKey);
          setMsg('Flushed ' + fmt(d.deleted_count || 0) + ' entr' + ((d.deleted_count || 0) === 1 ? 'y' : 'ies') + ' from ' + id + '.');
          setReloadKey(v => v + 1);
        } catch (e) { setErr(e.message); }
        setFlushing('');
      };

      const cbv = (st) => st === 'closed' ? 'success' : st === 'open' ? 'danger' : 'warning';
      const totalServers      = servers.length;
      const healthyServers    = servers.filter(sv => sv.healthy).length;
      const degradedServers   = Math.max(totalServers - healthyServers, 0);
      const totalReplicas     = servers.reduce((sum, sv) => sum + (sv.replicas?.length || 0), 0);
      const healthyReplicas   = servers.reduce((sum, sv) => sum + (sv.replicas?.filter(r => r.healthy).length || 0), 0);
      const totalTools        = servers.reduce((sum, sv) => sum + (sv.tools_count || sv.tools?.length || 0), 0);
      const latencies         = servers.map(sv => sv.latency_ms).filter(v => v != null && !isNaN(v));
      const avgLatency        = latencies.length > 0 ? latencies.reduce((s, v) => s + v, 0) / latencies.length : null;
      const circuitList       = Object.values(circuits).flat();
      const openCircuits      = circuitList.filter(cb => cb.state === 'open').length;
      const recoveringCircuits = circuitList.filter(cb => cb.state === 'half_open').length;
      const circuitTrips      = circuitList.reduce((s, cb) => s + (cb.trip_count || 0), 0);
      const cacheEntries      = cs?.entries || 0;
      const cacheHits         = cs?.hits || 0;
      const cacheMisses       = cs?.misses || 0;
      const cacheSkips        = cs?.skips || 0;
      const hrPct             = cs ? Math.round((cs.hitRate || 0) * 100) : 0;
      const hitRateLabel      = fmtPct(cs?.hitRate);
      const cacheWarm         = cs != null && (cacheEntries > 0 || cacheHits > 0 || cacheMisses > 0);
      const topToolLead       = topTools[0];

      if (loading) return <Page><div style={{padding:'var(--sp-7)'}}><Spinner/></div></Page>;

      return (
        <Page>
          <PageHeader
            kicker="Observe"
            kickerIcon={I.Server}
            title="Servers & Cache"
            lede="Inspect backend health, replica coverage, circuit protection, and cache efficiency from one operational surface."
            badges={[
              <Badge key="sv" tone={totalServers === 0 ? 'default' : degradedServers > 0 ? 'warning' : 'success'}>
                {healthyServers}/{totalServers} server{totalServers !== 1 ? 's' : ''} healthy
              </Badge>,
              <Badge key="cb" tone={openCircuits > 0 ? 'danger' : recoveringCircuits > 0 ? 'warning' : 'success'}>
                {openCircuits > 0 ? `${openCircuits} circuit${openCircuits !== 1 ? 's' : ''} open` :
                 recoveringCircuits > 0 ? `${recoveringCircuits} circuit${recoveringCircuits !== 1 ? 's' : ''} recovering` :
                 'Circuit breakers stable'}
              </Badge>,
              cs ? <Badge key="hr" tone={cacheWarm ? 'primary' : 'default'}>{hitRateLabel} hit rate</Badge>
                 : <Badge key="hr" tone="default">Cache stats unavailable</Badge>,
              topToolLead && <Badge key="tt" tone="primary">{topToolLead.name} leads cache hits</Badge>,
            ].filter(Boolean)}
          />

          <StatsRow>
            <StatTile label="Healthy Servers" value={`${healthyServers}/${totalServers || 0}`} sub={degradedServers > 0 ? `${degradedServers} need attention` : 'all primaries responding'}/>
            <StatTile label="Avg Latency"     value={fmtMs(avgLatency)} sub={latencies.length > 0 ? 'across primary probes' : 'no probe data yet'}/>
            <StatTile label="Cache Entries"   value={cs ? fmt(cacheEntries) : '—'} sub={cs ? `${fmt(cacheHits)} hits · ${fmt(cacheMisses)} misses` : 'cache stats unavailable'}/>
            <StatTile label="Hit Rate"        value={hitRateLabel} sub={cs ? `${fmt(cacheSkips)} skips · ${topTools.length} hot tool${topTools.length !== 1 ? 's' : ''}` : 'cache stats unavailable'}/>
          </StatsRow>

          <ErrorMsg err={err}/>
          <Notice msg={msg}/>

          <div className="ui-grid-2">
            <div className="ui-stack">
              <Section
                icon={I.Server}
                title="Backend Servers"
                copy="Expand a server to review routed tools and breaker telemetry."
                meta={<Badge tone={openCircuits > 0 ? 'danger' : degradedServers > 0 ? 'warning' : 'success'}>{totalServers} server{totalServers !== 1 ? 's' : ''}</Badge>}
              >
                <div className="ui-stack-sm">
                  {servers.length === 0 ? <Empty msg="No servers configured"/> :
                    servers.map(sv => {
                      const cbs = circuits[sv.id] || [];
                      const open = expanded[sv.id];
                      const pcb = cbs.find(c => c.replica_index === -1 || c.replica_index == null);
                      return (
                        <div key={sv.id} className="ui-server">
                          <div className="ui-server-head" onClick={()=>toggle(sv.id)}>
                            <div className="ui-row" style={{minWidth:0}}>
                              <span style={{display:'inline-flex', color:'var(--text-subtle)', transform: open ? 'rotate(90deg)' : 'none', transition:'transform 150ms var(--ease)'}}><I.ChevR/></span>
                              <HealthDot ok={sv.healthy}/>
                              <div style={{minWidth:0}}>
                                <p style={{fontSize:'13.5px', fontWeight:600}}>{sv.id}</p>
                                <p className="ui-mono" style={{fontSize:'11px', color:'var(--text-subtle)', marginTop:'2px', wordBreak:'break-word'}}>{sv.url}</p>
                              </div>
                            </div>
                            <div className="ui-row" style={{gap:'18px', flexWrap:'wrap', justifyContent:'flex-end'}}>
                              <div style={{textAlign:'right'}}>
                                <p className="ui-mono" style={{fontSize:'13px', fontWeight:600, lineHeight:1.1}}>{sv.latency_ms != null ? Math.round(sv.latency_ms)+'ms' : '—'}</p>
                                <p style={{fontSize:'10.5px', color:'var(--text-subtle)', textTransform:'uppercase', letterSpacing:'0.04em', marginTop:'2px'}}>latency</p>
                              </div>
                              <div style={{textAlign:'right'}}>
                                <p style={{fontSize:'13px', fontWeight:600, lineHeight:1.1}}>{sv.tools_count}</p>
                                <p style={{fontSize:'10.5px', color:'var(--text-subtle)', textTransform:'uppercase', letterSpacing:'0.04em', marginTop:'2px'}}>tools</p>
                              </div>
                              {pcb && <Badge tone={cbv(pcb.state)}>{pcb.state}</Badge>}
                            </div>
                          </div>

                          {open && (
                            <div className="ui-server-body anim-fade">
                              {sv.tools?.length > 0 && (
                                <div>
                                  <Label>Tools ({sv.tools_count})</Label>
                                  <div className="ui-row" style={{marginTop:'6px'}}>
                                    {sv.tools.map(t => <span key={t} className="ui-token">{t}</span>)}
                                  </div>
                                </div>
                              )}
                              {sv.replicas?.length > 0 && (
                                <div>
                                  <Label>Replicas</Label>
                                  <div className="ui-stack-xs" style={{marginTop:'6px'}}>
                                    {sv.replicas.map(r => {
                                      const rcb = cbs.find(c => c.replica_index === r.index);
                                      return (
                                        <div key={r.index} className="ui-inline" style={{padding:'8px 12px'}}>
                                          <div className="ui-row-between">
                                            <div className="ui-row">
                                              <HealthDot ok={r.healthy}/>
                                              <span className="ui-mono" style={{fontSize:'12px', color:'var(--text-muted)', wordBreak:'break-word'}}>{r.url}</span>
                                              <Badge>#{r.index}</Badge>
                                            </div>
                                            <div className="ui-row" style={{fontSize:'12px', color:'var(--text-subtle)'}}>
                                              <span className="ui-mono">{r.latency_ms != null ? Math.round(r.latency_ms)+'ms' : '—'}</span>
                                              <span>{r.active_connections} conn</span>
                                              {rcb && <Badge tone={cbv(rcb.state)}>{rcb.state}</Badge>}
                                            </div>
                                          </div>
                                        </div>
                                      );
                                    })}
                                  </div>
                                </div>
                              )}
                              {cbs.length > 0 && (
                                <div>
                                  <Label>Circuit Breakers</Label>
                                  <div className="ui-row" style={{marginTop:'6px'}}>
                                    {cbs.map((cb, i) => (
                                      <Chip key={i}>
                                        <span style={{color:'var(--text-muted)'}}>{cb.replica_index >= 0 ? `Replica ${cb.replica_index}` : 'Primary'}</span>
                                        <Badge tone={cbv(cb.state)}>{cb.state}</Badge>
                                        {cb.failures > 0 && <span style={{color:'var(--text-subtle)'}}>{cb.failures} fail</span>}
                                        {cb.trip_count > 0 && <span style={{color:'var(--text-subtle)'}}>{cb.trip_count} trips</span>}
                                      </Chip>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })
                  }
                </div>
              </Section>
            </div>

            <Section
              icon={I.DB}
              tone="success"
              title="Cache"
              copy="Hit rate, top cached tools, and per-server flush controls."
              meta={cs ? <Badge tone={cacheWarm ? 'success' : 'default'}>{cacheWarm ? 'Warm' : 'Idle'}</Badge> : <Badge tone="warning">Unavailable</Badge>}
            >
              <div className="ui-row" style={{gap:'16px', alignItems:'center', marginBottom:'16px'}}>
                <div style={{position:'relative', flexShrink:0}}>
                  <Ring pct={hrPct} size={76}/>
                  <div style={{position:'absolute', inset:0, display:'grid', placeItems:'center'}}>
                    <span style={{fontSize:'15px', fontWeight:600, color:'var(--success)'}}>{hrPct}%</span>
                  </div>
                </div>
                <div className="ui-grid-2-equal" style={{flex:1, gap:'8px'}}>
                  <MiniStat label="Entries" value={cs ? fmt(cacheEntries) : '—'} sub="in L1"/>
                  <MiniStat label="Hits"    value={cs ? fmt(cacheHits)    : '—'} sub="cached" valueClass="ui-dur-fast"/>
                  <MiniStat label="Misses"  value={cs ? fmt(cacheMisses)  : '—'} sub="upstream"/>
                  <MiniStat label="Skips"   value={cs ? fmt(cacheSkips)   : '—'} sub="not eligible"/>
                </div>
              </div>

              {topTools.length > 0 && (
                <div style={{paddingTop:'14px', borderTop:'1px solid var(--border-subtle)'}}>
                  <Label>Top Cached Tools</Label>
                  <div style={{marginTop:'4px'}}>
                    <ResponsiveContainer width="100%" height={Math.min(180, topTools.length * 24 + 20)}>
                      <BarChart data={topTools} layout="vertical" margin={{top:0, right:6, bottom:0, left:4}}>
                        <XAxis type="number" stroke="transparent" tick={{fontSize:10, fill:'#5f6770'}}/>
                        <YAxis type="category" dataKey="name" stroke="transparent" tick={{fontSize:11, fill:'#9aa3ad'}} width={120}/>
                        <Tooltip {...TT}/>
                        <Bar dataKey="count" fill="#3ecf8e" radius={[0,3,3,0]} opacity={0.85}/>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              )}

              <div style={{marginTop:'14px', paddingTop:'14px', borderTop:'1px solid var(--border-subtle)'}}>
                <div className="ui-row-between" style={{marginBottom:'8px'}}>
                  <Label>Flush Cache by Server</Label>
                  {confirm && <Badge tone="warning">Confirm {confirm}</Badge>}
                </div>
                <div className="ui-stack-xs">
                  {servers.length === 0 ? <Empty msg="No servers available to flush"/> :
                    servers.map(sv => (
                      <div key={sv.id} className="ui-list-item-flat">
                        <div className="ui-row">
                          <HealthDot ok={sv.healthy}/>
                          <div>
                            <p style={{fontSize:'13px', fontWeight:500}}>{sv.id}</p>
                            <p style={{fontSize:'11.5px', color:'var(--text-subtle)', marginTop:'2px'}}>{sv.tools_count} tools · {fmtMs(sv.latency_ms)}</p>
                          </div>
                        </div>
                        <Button
                          variant={confirm === sv.id ? 'destructive' : 'secondary'}
                          size="sm"
                          onClick={()=>flush(sv.id)}
                          disabled={flushing === sv.id}
                        >
                          <I.Trash/>
                          {flushing === sv.id ? 'Flushing…' : confirm === sv.id ? 'Confirm?' : 'Flush'}
                        </Button>
                      </div>
                    ))
                  }
                </div>
              </div>
            </Section>
          </div>
        </Page>
      );
    }

    function ServersView(props) { return <ServersCacheView {...props}/>; }
    function CacheView(props)   { return <ServersCacheView {...props}/>; }

    // ════════════════════════════════════════════════════════════════════════
    // VIEW · Access & Limits (Policy)
    // ════════════════════════════════════════════════════════════════════════
    function PolicyView({ adminKey, tick }) {
      const [limitsData, setLimitsData]     = useState(null);
      const [settingsData, setSettingsData] = useState(null);
      const [loading, setLoading]           = useState(true);
      const [pageErr, setPageErr]           = useState(null);
      const [client, setClient]             = useState('');
      const [server, setServer]             = useState('');
      const [tool, setTool]                 = useState('');
      const [result, setResult]             = useState(null);
      const [checking, setChecking]         = useState(false);
      const [checkErr, setCheckErr]         = useState(null);
      const [tab, setTab]                   = useState('rate-limits');

      useEffect(() => {
        let alive = true;
        async function load() {
          setLoading(true); setPageErr(null);
          const [limitsRes, settingsRes] = await Promise.allSettled([
            apiFetch('/limits', adminKey),
            apiFetch('/settings', adminKey),
          ]);
          if (!alive) return;
          const errors = [];
          if (limitsRes.status === 'fulfilled')   setLimitsData(limitsRes.value);
          else errors.push(limitsRes.reason?.message || 'Failed to load rate limits');
          if (settingsRes.status === 'fulfilled') setSettingsData(settingsRes.value);
          else errors.push(settingsRes.reason?.message || 'Failed to load settings snapshot');
          if (errors.length > 0) setPageErr(errors.join(' · '));
          setLoading(false);
        }
        load();
        return () => { alive = false; };
      }, [adminKey, tick]);

      const check = async () => {
        if (!client || !server || !tool) return;
        setChecking(true); setCheckErr(null); setResult(null);
        try {
          const url = '/acl/check?client=' + encodeURIComponent(client) + '&server=' + encodeURIComponent(server) + '&tool=' + encodeURIComponent(tool);
          const d = await apiFetch(url, adminKey);
          setResult(d);
        } catch (e) { setCheckErr(e.message); }
        setChecking(false);
      };

      if (loading && !limitsData && !settingsData) return <Page><div style={{padding:'var(--sp-7)'}}><Spinner/></div></Page>;

      const security        = settingsData?.security || {};
      const rateSettings    = settingsData?.rate_limits || {};
      const buckets         = limitsData?.buckets || [];
      const bucketCount     = buckets.length;
      const maxBucketCount  = buckets.reduce((max, bucket) => Math.max(max, bucket.count || 0), 0);
      const bucketDataKnown = limitsData !== null;
      const limitsKnown     = limitsData !== null || settingsData !== null;
      const aclKnown        = settingsData !== null;
      const limitsEnabled   = limitsData !== null ? Boolean(limitsData?.enabled) : settingsData !== null ? Boolean(rateSettings.enabled) : null;
      const aclEnabled      = aclKnown ? Boolean(security.acl_enabled) : null;
      const aclPolicies     = aclKnown ? (security.acl_policies || 0) : null;
      const aclDefaultAction = aclKnown ? (security.acl_default_action || 'allow') : 'unknown';
      const rateBackend     = settingsData !== null ? (rateSettings.backend || 'memory') : 'unknown';
      const limitOverrides  = settingsData !== null ? (rateSettings.overrides || 0) : null;
      const queueEnabled    = settingsData !== null ? Boolean(rateSettings.queue_enabled) : null;

      return (
        <Page>
          <PageHeader
            kicker="Operate"
            kickerIcon={I.Shield}
            title="Access & Limits"
            lede="Unified control surface for Conduit request governance — ACL decides who reaches which tools; rate limiting constrains throughput."
            badges={[
              limitsKnown ? <StateBadge key="rl" enabled={limitsEnabled === true} on="Rate limits enabled" off="Rate limits disabled" offTone="warning"/> : <Badge key="rl" tone="default">Rate limits unavailable</Badge>,
              aclKnown    ? <StateBadge key="ac" enabled={aclEnabled === true} on="ACL enabled" off="ACL disabled" offTone="warning"/> : <Badge key="ac" tone="default">ACL state unavailable</Badge>,
              <Badge key="bk" tone="default">{bucketCount} active bucket{bucketCount !== 1 ? 's' : ''}</Badge>,
              <Badge key="ap" tone={(aclPolicies || 0) > 0 ? 'primary' : 'default'}>{aclPolicies ?? '—'} ACL polic{aclPolicies === 1 ? 'y' : 'ies'}</Badge>,
            ]}
          />

          <StatsRow>
            <StatTile label="Limiter"        value={limitsKnown ? (limitsEnabled ? 'Enabled' : 'Disabled') : 'Unknown'} sub={`backend: ${rateBackend}`}/>
            <StatTile label="Active Buckets" value={limitsKnown ? String(bucketCount) : '—'} sub={limitsEnabled ? 'live usage windows' : limitsKnown ? 'no limiter state' : 'limiter data unavailable'}/>
            <StatTile label="ACL Policies"   value={aclKnown ? String(aclPolicies) : '—'} sub={aclEnabled ? 'ordered first-match rules' : aclKnown ? 'policy engine off' : 'ACL data unavailable'}/>
            <StatTile label="Default Action" value={aclDefaultAction} sub={queueEnabled === null ? 'queue state unavailable' : queueEnabled ? 'queue enabled' : 'queue disabled'}/>
          </StatsRow>

          <ErrorMsg err={pageErr}/>

          <Tabs
            value={tab}
            onChange={setTab}
            options={[
              { value: 'rate-limits', icon: I.Gauge, label: 'Rate Limits', badge: <Badge tone={limitsEnabled ? 'primary' : 'default'}>{bucketCount}</Badge> },
              { value: 'acl', icon: I.Shield, label: 'Access Control', badge: <Badge tone={aclEnabled ? 'primary' : 'default'}>{aclPolicies ?? '—'}</Badge> },
            ]}
          />

          {tab === 'rate-limits' && (
            <Section
              icon={I.Gauge}
              title="Rate Limits"
              copy="Live rate-limit buckets and limiter posture."
              meta={limitsKnown ? <StateBadge enabled={limitsEnabled === true} on="Limiter on" off="Limiter off" offTone="warning"/> : <Badge tone="default">Unavailable</Badge>}
            >
              <div className="ui-grid-3" style={{gap:'10px', marginBottom:'14px'}}>
                <MiniStat label="Backend" value={rateBackend} sub={queueEnabled === null ? 'queue ?' : queueEnabled ? 'queue on' : 'queue off'}/>
                <MiniStat label="Overrides" value={limitOverrides == null ? '—' : String(limitOverrides)} sub={limitOverrides === 1 ? 'override configured' : 'overrides configured'}/>
                <MiniStat label="Active buckets" value={String(bucketCount)} sub={limitsEnabled ? 'enforced' : 'inactive'}/>
              </div>

              <Label>Live buckets</Label>
              <div className="ui-stack-sm" style={{marginTop:'8px'}}>
                {limitsEnabled === false ? <Empty msg="Rate limiting is not enabled"/>
                  : !bucketDataKnown ? <Empty msg="Rate limit state unavailable"/>
                  : bucketCount === 0 ? <Empty msg="No active rate limit buckets"/>
                  : buckets.map((bucket, idx) => {
                      const label = bucket.key || ('Bucket ' + (idx + 1));
                      const age = bucket.oldest ? Math.round((Date.now() - bucket.oldest) / 1000) : null;
                      const relativePct = maxBucketCount > 0 ? Math.round((bucket.count / maxBucketCount) * 100) : 0;
                      const color = relativePct < 50 ? '#3ecf8e' : relativePct < 80 ? '#f5a524' : '#ef4444';
                      return (
                        <div key={bucket.key || idx} className="ui-inline">
                          <div className="ui-row-between" style={{marginBottom:'8px'}}>
                            <div style={{minWidth:0}}>
                              <p className="ui-mono" style={{fontSize:'13px', fontWeight:500, wordBreak:'break-word'}}>{label}</p>
                              <p style={{fontSize:'11px', color:'var(--text-subtle)', marginTop:'2px'}}>{age != null ? `oldest ${age}s ago` : 'no timestamp'}</p>
                            </div>
                            <p className="ui-mono" style={{fontSize:'15px', fontWeight:600, color, flexShrink:0}}>{bucket.count}</p>
                          </div>
                          <div className="ui-meter">
                            <div className="ui-meter-fill" style={{width: relativePct + '%', background: color}}/>
                          </div>
                        </div>
                      );
                    })
                }
              </div>
            </Section>
          )}

          {tab === 'acl' && (
            <Section
              icon={I.Shield}
              tone="warning"
              title="Access Control"
              copy="ACL posture and policy check tester."
              meta={aclKnown ? <StateBadge enabled={aclEnabled === true} on="ACL on" off="ACL off" offTone="warning"/> : <Badge>Unavailable</Badge>}
            >
              <div className="ui-grid-3" style={{gap:'10px', marginBottom:'14px'}}>
                <MiniStat label="Engine" value={aclEnabled === true ? 'Active' : aclEnabled === false ? 'Off' : 'Unknown'} sub={aclEnabled ? 'evaluating' : 'unmatched allowed'}/>
                <MiniStat label="Default" value={aclDefaultAction} sub="when no rule matches"/>
                <MiniStat label="Policies" value={aclPolicies == null ? '—' : String(aclPolicies)} sub={aclPolicies === 1 ? 'configured rule' : 'configured rules'}/>
              </div>

              <Label>Policy check</Label>
              <p className="ui-help">Test access without making a real request to an upstream.</p>
              <div className="ui-grid-3" style={{marginTop:'10px'}}>
                <Field label="Client ID">
                  <Input type="text" value={client} onChange={e=>setClient(e.target.value)} onKeyDown={e=>e.key === 'Enter' && check()} placeholder="e.g. client-abc"/>
                </Field>
                <Field label="Server ID">
                  <Input type="text" value={server} onChange={e=>setServer(e.target.value)} onKeyDown={e=>e.key === 'Enter' && check()} placeholder="e.g. server-a"/>
                </Field>
                <Field label="Tool Name">
                  <Input type="text" value={tool} onChange={e=>setTool(e.target.value)} onKeyDown={e=>e.key === 'Enter' && check()} placeholder="e.g. get_contact"/>
                </Field>
              </div>

              <Button variant="primary" onClick={check} disabled={checking || !client || !server || !tool} style={{marginTop:'12px'}}>
                {checking ? 'Checking…' : 'Check Access'}
              </Button>

              {checkErr && <div style={{marginTop:'12px'}}><ErrorMsg err={checkErr}/></div>}

              {result && (
                <div className="ui-policy-result anim-fade" data-tone={result.allowed ? 'allowed' : 'denied'} style={{marginTop:'14px'}}>
                  <div className="ui-policy-result-icon">{result.allowed ? <I.Check/> : <I.X/>}</div>
                  <div>
                    <p style={{fontWeight:600, color: result.allowed ? 'var(--success)' : 'var(--danger)', fontSize:'14px'}}>{result.allowed ? 'Access Allowed' : 'Access Denied'}</p>
                    {result.policy && <p style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'4px'}}>Policy: <span className="ui-mono" style={{color:'var(--text)'}}>{result.policy}</span></p>}
                    {result.reason && <p style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'2px'}}>Reason: {result.reason}</p>}
                  </div>
                </div>
              )}
            </Section>
          )}
        </Page>
      );
    }

    function LimitsView(props) { return <PolicyView {...props}/>; }
    function AclView(props)    { return <PolicyView {...props}/>; }

    // ════════════════════════════════════════════════════════════════════════
    // VIEW · Settings
    // ════════════════════════════════════════════════════════════════════════
    function SettingsView({ adminKey, tick }) {
      const [data, setData]             = useState(null);
      const [loading, setLoading]       = useState(true);
      const [refreshing, setRefreshing] = useState(false);
      const [reloading, setReloading]   = useState(false);
      const [err, setErr]               = useState(null);
      const [msg, setMsg]               = useState('');
      const [tab, setTab]               = useState('gateway');

      const loadSnapshot = useCallback(async (silent = false) => {
        if (silent) setRefreshing(true); else setLoading(true);
        try {
          const snapshot = await apiFetch('/settings', adminKey);
          setData(snapshot);
          setErr(null);
        } catch (e) { setErr(e.message); }
        if (silent) setRefreshing(false); else setLoading(false);
      }, [adminKey]);

      useEffect(() => { loadSnapshot(Boolean(data)); }, [loadSnapshot, tick]); // eslint-disable-line

      const reloadConfig = async () => {
        setReloading(true); setErr(null); setMsg('');
        try {
          const result = await apiPost('/config/reload', adminKey, {});
          const reloaded = result.reloaded?.length || 0;
          const skipped  = result.skipped?.length || 0;
          setMsg(reloaded > 0
            ? `Reloaded ${reloaded} section${reloaded !== 1 ? 's' : ''}${skipped ? `, skipped ${skipped}` : ''}.`
            : 'Reload completed. No hot-reloadable changes were applied.');
          await loadSnapshot(true);
        } catch (e) { setErr(e.message); }
        setReloading(false);
      };

      if (loading && !data) return <Page><div style={{padding:'var(--sp-7)'}}><Spinner/></div></Page>;
      if (!data) return <Page><ErrorMsg err={err || 'Unable to load settings snapshot'}/></Page>;

      const runtime       = data.runtime || {};
      const gateway       = data.gateway || {};
      const routing       = data.routing || {};
      const healthCheck   = routing.health_check || {};
      const circuit       = routing.circuit_breaker || {};
      const security      = data.security || {};
      const caching       = data.caching || {};
      const observability = data.observability || {};
      const rateLimits    = data.rate_limits || {};
      const connect       = data.connect || {};
      const servers       = data.servers || {};
      const discovery     = data.discovery || {};
      const plugins       = data.plugins || {};
      const connectProfiles  = connect.profiles || [];
      const pluginItems      = plugins.items || [];
      const discoveryBackends = discovery.backends || [];
      const authEnabled = security.auth_method && security.auth_method !== 'none';
      const authLabel   = security.auth_method === 'jwt' ? 'JWT' : security.auth_method === 'api-key' ? 'API key' : 'None';
      const backendTone = runtime.backends_total === 0 ? 'default' : runtime.backends_healthy === runtime.backends_total ? 'success' : 'warning';
      const backendLabel = runtime.backends_total === 0
        ? 'No live probes'
        : runtime.backends_healthy === runtime.backends_total
          ? 'All backends healthy'
          : `${runtime.backends_healthy}/${runtime.backends_total} backends healthy`;

      return (
        <Page>
          <PageHeader
            kicker="Operate"
            kickerIcon={I.Settings}
            title="Settings"
            lede="Operational view of the live Conduit configuration. The page keeps the runtime posture, control toggles, and distribution settings in one place without exposing secrets."
            actions={
              <Fragment>
                <Button onClick={()=>{ setMsg(''); loadSnapshot(true); }} disabled={refreshing || reloading}>
                  {refreshing ? 'Refreshing…' : 'Refresh snapshot'}
                </Button>
                <Button variant="primary" onClick={reloadConfig} disabled={reloading}>
                  {reloading ? 'Reloading…' : 'Reload configuration'}
                </Button>
              </Fragment>
            }
            badges={[
              <Badge key="bk" tone={backendTone}>{backendLabel}</Badge>,
              <StateBadge key="ad" enabled={security.admin_key_enabled} on="Admin protected" off="Open admin API" offTone="warning"/>,
              <StateBadge key="cc" enabled={caching.enabled} on="Cache enabled" off="Cache disabled"/>,
              <Badge key="v"  tone="default"><span className="ui-mono">v{data.version}</span></Badge>,
              <Badge key="ns" tone="default">Namespace: {routing.namespace_strategy}</Badge>,
              <Badge key="lb" tone="default">LB: {routing.load_balancing}</Badge>,
              refreshing && <Badge key="rf" tone="primary">Refreshing…</Badge>,
            ].filter(Boolean)}
          />

          <StatsRow>
            <StatTile label="Uptime"   value={fmtUp(runtime.uptime_seconds)} sub="current process lifetime"/>
            <StatTile label="Servers"  value={String(servers.total || 0)} sub={`${servers.http || 0} HTTP · ${servers.stdio || 0} stdio`}/>
            <StatTile label="Profiles" value={String(connectProfiles.length)} sub={`${connect.custom_profiles || 0} custom + default`}/>
            <StatTile label="Plugins"  value={String(plugins.count || 0)} sub={discovery.enabled ? 'discovery active' : 'discovery idle'}/>
          </StatsRow>

          <ErrorMsg err={err}/>
          <Notice msg={msg}/>

          <Tabs
            value={tab}
            onChange={setTab}
            options={[
              { value: 'gateway',  icon: I.Server,   label: 'Gateway' },
              { value: 'security', icon: I.Shield,   label: 'Security' },
              { value: 'routing',  icon: I.Gauge,    label: 'Routing' },
              { value: 'cache',    icon: I.DB,       label: 'Cache & Logs' },
              { value: 'delivery', icon: I.Plug,     label: 'Delivery' },
              { value: 'profiles', icon: I.List,     label: 'Profiles', badge: <Badge tone="default">{connectProfiles.length}</Badge> },
            ]}
          />

          {tab === 'gateway' && (
            <Section
              icon={I.Server}
              title="Gateway & Runtime"
              copy="Network entrypoint, backend footprint, and runtime health."
              meta={<Badge tone={gateway.tls_enabled ? 'success' : 'warning'}>{gateway.tls_enabled ? 'TLS enabled' : 'HTTP only'}</Badge>}
            >
              <div className="ui-kv">
                <KeyValue label="Listener" hint="Public gateway bind address"
                  value={<span className="ui-mono">{gateway.host}:{gateway.port}</span>}
                  badge={<Badge>{gateway.mtls_enabled ? 'mTLS ready' : 'single cert'}</Badge>}/>
                <KeyValue label="Uptime" hint="Current process lifetime" value={fmtUp(runtime.uptime_seconds)}
                  badge={<Badge tone={backendTone}>{backendLabel}</Badge>}/>
                <KeyValue label="Server mix" hint="Configured upstream transport split"
                  value={`${servers.http || 0} HTTP, ${servers.stdio || 0} stdio, ${servers.replicas || 0} replicas`}
                  badge={<Badge>{servers.total || 0} total</Badge>}/>
                <KeyValue label="Metrics" hint="Prometheus scrape endpoint"
                  value={gateway.metrics_enabled ? <span className="ui-mono">:{gateway.metrics_port}</span> : 'Disabled'}
                  badge={<StateBadge enabled={gateway.metrics_enabled} on="Exposed" off="Hidden"/>}/>
                <KeyValue label="Reload path" hint="Hot reload from the dashboard"
                  value={runtime.reload_available ? 'POST /conduit/config/reload is active' : 'Reload hook unavailable'}
                  badge={<StateBadge enabled={runtime.reload_available} on="Ready" off="Unavailable" offTone="warning"/>}/>
              </div>
            </Section>
          )}

          {tab === 'security' && (
            <Section
              icon={I.Shield}
              tone="warning"
              title="Security & Access"
              copy="Admin protection, gateway auth, tenant isolation, and policies."
              meta={<StateBadge enabled={security.admin_key_enabled} on="Protected" off="Exposed" offTone="warning"/>}
            >
              <div className="ui-kv">
                <KeyValue label="Admin API" hint="Dashboard API authorization"
                  value={security.admin_key_enabled ? 'Bearer token required for admin endpoints.' : 'Admin endpoints accept unauthenticated requests.'}
                  badge={<StateBadge enabled={security.admin_key_enabled} on="Locked" off="Open" offTone="warning"/>}/>
                <KeyValue label="Authentication" hint="Client auth mode at the edge"
                  value={authEnabled ? `${authLabel} authentication is enforced.` : 'Gateway auth is disabled.'}
                  badge={<StateBadge enabled={authEnabled} on={authLabel} off="None" offTone="default"/>}/>
                <KeyValue label="Tenant isolation" hint="Per-tenant request partitioning"
                  value={security.tenant_isolation_enabled ? <span className="ui-mono">{security.tenant_header}</span> : 'Disabled'}
                  badge={<StateBadge enabled={security.tenant_isolation_enabled} on="Header scoped" off="Shared"/>}/>
                <KeyValue label="ACL" hint="Tool- and server-level allow/deny policies"
                  value={security.acl_enabled ? `${security.acl_policies} policies, default ${security.acl_default_action}` : 'Policy engine disabled.'}
                  badge={<StateBadge enabled={security.acl_enabled} on="Enforced" off="Off"/>}/>
                <KeyValue label="Guardrails" hint="Static tool-argument checks"
                  value={security.guardrails_enabled ? `${security.guardrails_rules} rules, default ${security.guardrails_default_action}` : 'No guardrails configured.'}
                  badge={<StateBadge enabled={security.guardrails_enabled} on="Active" off="Off"/>}/>
              </div>
            </Section>
          )}

          {tab === 'routing' && (
            <Section
              icon={I.Gauge}
              title="Routing & Resilience"
              copy="Tool naming, load balancing, health probes, circuit breakers."
              meta={<Badge tone={circuit.enabled ? 'success' : 'default'}>{circuit.enabled ? 'Circuit on' : 'Circuit off'}</Badge>}
            >
              <div className="ui-kv">
                <KeyValue label="Namespace" hint="Tool names exposed to clients"
                  value={routing.namespace_strategy === 'prefix' ? 'Server-prefixed' : 'Original upstream'}
                  badge={<Badge>{routing.namespace_strategy}</Badge>}/>
                <KeyValue label="Balancing" hint="Replica selection policy"
                  value={routing.load_balancing === 'least-connections' ? 'Least-connections' : 'Round-robin'}
                  badge={<Badge tone="primary">{routing.load_balancing}</Badge>}/>
                <KeyValue label="Health probes" hint="Backend liveness checks"
                  value={healthCheck.enabled ? `Every ${healthCheck.interval_seconds}s · ${fmtMs(healthCheck.timeout_ms)} timeout` : 'Disabled.'}
                  badge={<StateBadge enabled={healthCheck.enabled} on="Running" off="Idle"/>}/>
                <KeyValue label="Circuit breaker" hint="Failure isolation"
                  value={circuit.enabled ? `Trips after ${circuit.failure_threshold} failures · ${fmtMs(circuit.reset_timeout_ms)} reset` : 'Disabled.'}
                  badge={<StateBadge enabled={circuit.enabled} on="Protecting" off="Off"/>}/>
              </div>

              <div className="ui-grid-4" style={{gap:'8px', marginTop:'14px'}}>
                <MiniStat label="Probe thresholds" value={`${healthCheck.healthy_threshold}/${healthCheck.unhealthy_threshold}`} sub="up / down"/>
                <MiniStat label="Half-open" value={String(circuit.half_open_max_requests || '—')} sub="trials"/>
                <MiniStat label="Close at" value={String(circuit.success_threshold || '—')} sub="successes"/>
                <MiniStat label="RL queue" value={rateLimits.queue_enabled ? 'On' : 'Off'} sub={`${rateLimits.overrides || 0} overrides`}/>
              </div>
            </Section>
          )}

          {tab === 'cache' && (
            <Section
              icon={I.DB}
              tone="success"
              title="Cache & Observability"
              copy="Memory footprint, distributed cache, logging, and telemetry."
              meta={<StateBadge enabled={caching.enabled} on="Cache on" off="Cache off"/>}
            >
              <div className="ui-kv">
                <KeyValue label="L1 cache" hint="In-process limits"
                  value={`${caching.l1_max_entries} entries · ${caching.l1_max_entry_size_kb} KB max item`}
                  badge={<StateBadge enabled={caching.enabled} on="Enabled" off="Disabled"/>}/>
                <KeyValue label="Redis L2" hint="Distributed cache layer"
                  value={caching.l2_enabled ? <span className="ui-mono">{caching.l2_key_prefix}</span> : 'Not configured'}
                  badge={<StateBadge enabled={caching.l2_enabled} on="Online" off="L1 only"/>}/>
                <KeyValue label="Logging" hint="What gets persisted per request"
                  value={`${observability.log_args ? 'args' : 'no args'} · ${observability.log_responses ? 'responses' : 'no responses'}`}
                  badge={<Badge>{observability.redact_fields_count} redacted</Badge>}/>
                <KeyValue label="Retention" hint="SQLite request history"
                  value={`${observability.retention_days} days`} badge={<Badge>{observability.database_mode}</Badge>}/>
                <KeyValue label="OpenTelemetry" hint="Trace export to collectors"
                  value={observability.opentelemetry_enabled ? `${observability.otel_service_name || 'conduit'} · sample ${observability.otel_sample_rate}` : 'Disabled'}
                  badge={<StateBadge enabled={observability.opentelemetry_enabled} on="Exporting" off="Off"/>}/>
              </div>

              <div className="ui-grid-2-equal" style={{marginTop:'14px'}}>
                <MiniStat label="L2 TTL multiplier" value={`${caching.l2_ttl_multiplier}x`} sub="relative to L1"/>
                <MiniStat label="L2 max item" value={`${caching.l2_max_entry_size_kb} KB`} sub="payload budget"/>
              </div>
            </Section>
          )}

          {tab === 'delivery' && (
            <Section
              icon={I.Plug}
              title="Delivery & Discovery"
              copy="Client distribution, registry ingest, service discovery, plugins."
              meta={<Badge tone={connect.registry_enabled ? 'primary' : 'default'}>{connect.registry_enabled ? 'Registry on' : 'Registry off'}</Badge>}
            >
              <div className="ui-kv">
                <KeyValue label="Connect profiles" hint="Exportable client profiles"
                  value={`${connectProfiles.length} available`}
                  badge={<Badge>{connect.custom_profiles || 0} custom</Badge>}/>
                <KeyValue label="Registry library" hint="Official MCP Registry sync"
                  value={connect.registry_enabled ? `${connect.registry_latest_only ? 'Latest only' : 'All versions'} · TTL ${connect.registry_cache_ttl_seconds || 0}s` : 'Disabled'}
                  badge={<StateBadge enabled={connect.registry_enabled} on="Synced" off="Off"/>}/>
                <KeyValue label="Discovery" hint="Automatic upstream registration"
                  value={discovery.enabled ? `Poll ${discovery.poll_interval_seconds}s · stale ${discovery.stale_timeout_seconds}s` : 'Disabled'}
                  badge={<StateBadge enabled={discovery.enabled} on="Watching" off="Manual"/>}/>
                <KeyValue label="Plugins" hint="Pipeline extensions"
                  value={pluginItems.length > 0 ? `${pluginItems.length} registered` : 'No plugins loaded'}
                  badge={<Badge>{plugins.count || 0}</Badge>}/>
              </div>

              {(discoveryBackends.length > 0 || pluginItems.length > 0) && (
                <div style={{marginTop:'14px', display:'flex', flexDirection:'column', gap:'10px'}}>
                  {discoveryBackends.length > 0 && (
                    <div>
                      <Label>Discovery backends</Label>
                      <div className="ui-row" style={{marginTop:'6px'}}>
                        {discoveryBackends.map(b => <Chip key={b}>{b}</Chip>)}
                      </div>
                    </div>
                  )}
                  {pluginItems.length > 0 && (
                    <div>
                      <Label>Loaded plugins</Label>
                      <div className="ui-row" style={{marginTop:'6px'}}>
                        {pluginItems.map(p => <Chip key={p.name}><span className="ui-mono">{p.name}</span> · {p.hooks}h</Chip>)}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </Section>
          )}

          {tab === 'profiles' && (
            <Section
              icon={I.List}
              title="Connect Profiles"
              copy="Profiles used by the Connect page for client snippets and bundles."
              flush
            >
              <div className="ui-list">
                {connectProfiles.length === 0 ? <Empty msg="No profiles configured"/> :
                  connectProfiles.map(profile => (
                    <div key={profile.id} className="ui-list-item">
                      <div>
                        <p style={{fontSize:'13px', fontWeight:500}}>{profile.label}</p>
                        <p className="ui-mono" style={{fontSize:'11px', color:'var(--text-subtle)', marginTop:'2px'}}>{profile.id}</p>
                      </div>
                      <Badge tone={profile.id === 'default' ? 'primary' : 'default'}>{profile.server_count} server{profile.server_count === 1 ? '' : 's'}</Badge>
                    </div>
                  ))
                }
              </div>
            </Section>
          )}
        </Page>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // VIEW · Registry
    // ════════════════════════════════════════════════════════════════════════
    function RegistryView({ adminKey }) {
      const [catalog, setCatalog]                 = useState(null);
      const [data, setData]                       = useState(null);
      const [loading, setLoading]                 = useState(true);
      const [refreshing, setRefreshing]           = useState(false);
      const [err, setErr]                         = useState(null);
      const [msg, setMsg]                         = useState('');
      const [copyMsg, setCopyMsg]                 = useState('');
      const [importing, setImporting]             = useState({});
      const [installing, setInstalling]           = useState({});
      const [installSessions, setInstallSessions] = useState({});
      const [configDrafts, setConfigDrafts]       = useState({});
      const [expandedConfig, setExpandedConfig]   = useState('');
      const [searchInput, setSearchInput]         = useState('');
      const [search, setSearch]                   = useState('');
      const [status, setStatus]                   = useState('');
      const [installMode, setInstallMode]         = useState('');
      const [readiness, setReadiness]             = useState('');
      const [packageType, setPackageType]         = useState('');
      const [minScore, setMinScore]               = useState('0');
      const [autoImportable, setAutoImportable]   = useState('');
      const [verifiedPublisher, setVerifiedPublisher] = useState('');
      const [runtimeStatus, setRuntimeStatus]     = useState('');
      const [policyFit, setPolicyFit]             = useState('');
      const [compatTarget, setCompatTarget]       = useState('');
      const [sort, setSort]                       = useState('trust');
      const [pageSize, setPageSize]               = useState('24');
      const [offset, setOffset]                   = useState(0);
      const [profileId, setProfileId]             = useState('');
      const [target, setTarget]                   = useState('cursor');
      const [scope, setScope]                     = useState('user');
      const [authSecret, setAuthSecret]           = useState('');
      const [showAdvancedFilters, setShowAdvancedFilters] = useState(false);

      const loadLibrary = useCallback(async () => {
        setLoading(true); setErr(null);
        try {
          const params = new URLSearchParams();
          if (search.trim()) params.set('search', search.trim());
          if (status) params.set('status', status);
          if (installMode) params.set('install_mode', installMode);
          if (readiness) params.set('readiness', readiness);
          if (packageType) params.set('package_type', packageType);
          if (Number(minScore) > 0) params.set('min_score', minScore);
          if (autoImportable) params.set('auto_importable', autoImportable);
          if (verifiedPublisher) params.set('verified_publisher', verifiedPublisher);
          if (runtimeStatus) params.set('runtime_status', runtimeStatus);
          if (policyFit) params.set('policy_fit', policyFit);
          if (compatTarget) params.set('target', compatTarget);
          if (sort) params.set('sort', sort);
          params.set('limit', String(Number(pageSize) || 24));
          params.set('offset', String(offset));
          const query = params.toString() ? '?' + params.toString() : '';
          const result = await apiFetch('/connect/registry/library' + query, adminKey);
          setData(result);
        } catch (e) { setErr(e.message); }
        setLoading(false);
      }, [adminKey, search, status, installMode, readiness, packageType, minScore, autoImportable, verifiedPublisher, runtimeStatus, policyFit, compatTarget, sort, pageSize, offset]);

      useEffect(() => {
        const id = setTimeout(() => setSearch(searchInput), 180);
        return () => clearTimeout(id);
      }, [searchInput]);

      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            const result = await apiFetch('/connect/catalog', adminKey);
            if (!alive) return;
            setCatalog(result);
            if (result?.targets?.length > 0 && !result.targets.some(e => e.id === target)) {
              setTarget(result.targets[0].id);
            }
          } catch {}
        })();
        return () => { alive = false; };
      }, [adminKey]); // eslint-disable-line

      useEffect(() => { loadLibrary(); }, [loadLibrary]);
      useEffect(() => { setOffset(0); }, [search, status, installMode, readiness, packageType, minScore, autoImportable, verifiedPublisher, runtimeStatus, policyFit, compatTarget, sort, pageSize]);

      const refreshLibrary = async () => {
        setRefreshing(true); setErr(null);
        try {
          await apiPost('/connect/registry/refresh', adminKey, {});
          await loadLibrary();
          setMsg('Library refreshed from the official MCP registry.');
          setTimeout(() => setMsg(''), 2000);
        } catch (e) { setErr(e.message); }
        setRefreshing(false);
      };

      const copyText = async (text) => {
        try { await navigator.clipboard.writeText(text); setCopyMsg('Copied'); }
        catch { setCopyMsg('Copy failed'); }
        setTimeout(() => setCopyMsg(''), 1500);
      };

      const runRemoteHandoff = async (session, pendingWindow) => {
        try {
          if (session?.profile_url) {
            await navigator.clipboard.writeText(session.profile_url);
            setCopyMsg('Profile URL copied');
            setTimeout(() => setCopyMsg(''), 1500);
          }
        } catch {}
        if (session?.settings_url) {
          if (pendingWindow) pendingWindow.location = session.settings_url;
          else window.open(session.settings_url, '_blank', 'noopener');
        } else if (pendingWindow) pendingWindow.close();
      };

      const buildDefaultDraft = (item) => ({
        variables: Object.fromEntries(((item.import_requirements?.variables) || [])
          .filter(f => typeof f.default_value === 'string' && f.default_value.length > 0)
          .map(f => [f.key, f.default_value])),
        headers: {},
        env: {},
      });

      const getDraft = (item) => {
        const defaults = buildDefaultDraft(item);
        const stored = configDrafts[item.name] || {};
        return {
          variables: { ...defaults.variables, ...(stored.variables || {}) },
          headers:   { ...defaults.headers,   ...(stored.headers   || {}) },
          env:       { ...defaults.env,       ...(stored.env       || {}) },
        };
      };

      const updateDraft = (itemName, section, key, value) => {
        setConfigDrafts(prev => ({
          ...prev,
          [itemName]: {
            ...(prev[itemName] || {}),
            [section]: { ...((prev[itemName] && prev[itemName][section]) || {}), [key]: value },
          },
        }));
      };

      const compactMap = (value) => Object.fromEntries(
        Object.entries(value || {}).filter(([, e]) => String(e || '').trim().length > 0),
      );

      const importServer = async (item) => {
        setImporting(prev => ({ ...prev, [item.name]: true }));
        setErr(null); setMsg('');
        try {
          const draft = getDraft(item);
          const variables = compactMap(draft.variables);
          const headers   = compactMap(draft.headers);
          const env       = compactMap(draft.env);
          const res = await apiPost('/connect/registry/import', adminKey, {
            server_name: item.name,
            version: item.version,
            ...(item.strategy && item.strategy !== 'manual' ? { strategy: item.strategy } : {}),
            ...(profileId.trim() ? { profile_id: profileId.trim() } : {}),
            ...(Object.keys(variables).length > 0 ? { variables } : {}),
            ...(Object.keys(headers).length > 0   ? { headers }   : {}),
            ...(Object.keys(env).length > 0       ? { env }       : {}),
          });
          const changed = [...(res.imported_servers || []), ...(res.updated_servers || [])];
          const skipped = (res.skipped_servers || []).length;
          setMsg(changed.length > 0
            ? `Imported ${changed.join(', ')}${skipped ? ` (${skipped} skipped)` : ''}${profileId.trim() ? ` into profile ${profileId.trim()}` : ''}.`
            : 'Nothing imported.');
          setExpandedConfig('');
          await loadLibrary();
        } catch (e) { setErr(e.message); }
        setImporting(prev => ({ ...prev, [item.name]: false }));
      };

      const installServer = async (item) => {
        setInstalling(prev => ({ ...prev, [item.name]: true }));
        setErr(null); setMsg('');
        const remoteTarget = (catalog?.targets || []).find(e => e.id === target)?.delivery === 'remote-connector';
        const pendingWindow = remoteTarget ? window.open('about:blank', '_blank') : null;
        try {
          const draft = getDraft(item);
          const variables = compactMap(draft.variables);
          const headers   = compactMap(draft.headers);
          const env       = compactMap(draft.env);
          const res = await apiPost('/connect/registry/install', adminKey, {
            server_name: item.name, version: item.version, target, scope,
            ...(item.strategy && item.strategy !== 'manual' ? { strategy: item.strategy } : {}),
            ...(profileId.trim() ? { profile_id: profileId.trim() } : {}),
            ...(!remoteTarget && authSecret.trim() ? { auth_secret: authSecret.trim() } : {}),
            ...(Object.keys(variables).length > 0 ? { variables } : {}),
            ...(Object.keys(headers).length > 0   ? { headers }   : {}),
            ...(Object.keys(env).length > 0       ? { env }       : {}),
          });
          if (!profileId.trim() && res.profile_id) setProfileId(String(res.profile_id));
          const session = res.remote_session || res.install_session;
          if (session) {
            setInstallSessions(prev => ({ ...prev, [item.name]: session }));
            if (res.install_session?.deeplink) window.location.assign(res.install_session.deeplink);
            if (res.remote_session) await runRemoteHandoff(res.remote_session, pendingWindow);
          }
          const changed = [...(res.imported_servers || []), ...(res.updated_servers || [])];
          setMsg(changed.length > 0
            ? `Prepared ${changed.join(', ')} for ${(session?.target_label) || target}.`
            : `Prepared distribution handoff for ${(session?.target_label) || target}.`);
          setExpandedConfig('');
          await loadLibrary();
        } catch (e) { if (pendingWindow) pendingWindow.close(); setErr(e.message); }
        setInstalling(prev => ({ ...prev, [item.name]: false }));
      };

      const openConfig = (item) => {
        setExpandedConfig(c => c === item.name ? '' : item.name);
        setConfigDrafts(prev => prev[item.name] ? prev : { ...prev, [item.name]: buildDefaultDraft(item) });
      };

      const badgeForReadiness = (v) => v === 'ready' ? 'success' : v === 'needs-config' ? 'warning' : v === 'blocked' ? 'danger' : 'default';
      const badgeForStatus    = (v) => v === 'active' ? 'success' : v === 'deprecated' ? 'warning' : v === 'deleted' ? 'danger' : 'default';
      const badgeForRuntime   = (v) => v === 'healthy' ? 'success' : v === 'unhealthy' ? 'danger' : 'default';
      const badgeForPolicy    = (v) => v === 'allowed' ? 'success' : v === 'blocked' ? 'danger' : 'default';
      const toneForReadiness  = (v) => v === 'ready' ? 'success' : v === 'needs-config' || v === 'blocked' ? 'warning' : 'info';
      const iconForInstallMode = (v) => v === 'package' ? I.DB : v === 'hybrid' ? I.Plug : I.Server;

      const source       = data?.source;
      const stats        = data?.stats || {};
      const items        = data?.items || [];
      const pagination   = data?.pagination || {};
      const targets      = catalog?.targets || [];
      const selectedTarget = targets.find(e => e.id === target);
      const isRemoteTarget = selectedTarget?.delivery === 'remote-connector';
      const activeFilters  = [
        search.trim() ? `Search: ${search.trim()}` : '',
        status ? `Status: ${status}` : '',
        installMode ? `Mode: ${installMode}` : '',
        readiness ? `Readiness: ${readiness}` : '',
        packageType ? `Package: ${packageType}` : '',
        Number(minScore) > 0 ? `Score >= ${minScore}` : '',
        autoImportable === 'true' ? 'One-click only' : autoImportable === 'false' ? 'Manual review only' : '',
        verifiedPublisher === 'true' ? 'Verified publishers only' : verifiedPublisher === 'false' ? 'Unverified only' : '',
        runtimeStatus ? `Runtime: ${runtimeStatus}` : '',
        policyFit ? `Policy: ${policyFit}` : '',
        compatTarget ? `Target: ${compatTarget}` : '',
      ].filter(Boolean);
      const filteredCount = stats.filtered || 0;
      const totalCount    = stats.total || 0;
      const visibleCount  = items.length;
      const visibleStart  = filteredCount === 0 ? 0 : ((pagination.offset || 0) + 1);
      const visibleEnd    = (pagination.offset || 0) + visibleCount;
      const currentPage   = pagination.page || 1;
      const totalPages    = pagination.total_pages || 1;
      const canGoBack     = typeof pagination.previous_offset === 'number' && pagination.offset > 0;
      const canGoNext     = Boolean(pagination.has_more);
      const installReadyCount = (stats.ready || 0) + (stats.needs_config || 0);
      const selectedTargetLabel = selectedTarget?.label || target;
      const targetCount   = targets.length;
      const latestOnlyLabel = source?.latest_only ? 'Latest only' : 'All versions';
      const resultsCopy   = loading
        ? 'Refreshing the official registry snapshot for the current filters.'
        : filteredCount > 0
          ? `Showing ${fmt(visibleStart)}-${fmt(visibleEnd)} of ${fmt(filteredCount)} filtered matches${search.trim() ? ` for "${search.trim()}"` : ''}.`
          : 'No registry servers match the current filters.';

      const clearFilters = () => {
        setSearchInput(''); setSearch(''); setStatus(''); setInstallMode(''); setReadiness('');
        setPackageType(''); setMinScore('0'); setAutoImportable(''); setVerifiedPublisher('');
        setRuntimeStatus(''); setPolicyFit(''); setCompatTarget(''); setSort('trust');
        setPageSize('24'); setOffset(0);
      };

      const jumpToOffset = (next) => {
        setOffset(Math.max(0, next || 0));
        if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const renderRequirementGroup = (item, groupKey, label) => {
        const fields = item.import_requirements?.[groupKey] || [];
        if (fields.length === 0) return null;
        const draft = getDraft(item);
        return (
          <div className="ui-stack-sm">
            <Label>{label}</Label>
            {fields.map(field => (
              <div key={groupKey + field.key} className="ui-stack-xs">
                <div className="ui-row-tight">
                  <span className="ui-mono" style={{fontSize:'12px', color:'var(--text)'}}>{field.label || field.key}</span>
                  {field.required && <Badge tone="warning">required</Badge>}
                  {field.secret && <Badge>secret</Badge>}
                  {field.default_value && <Badge>default {field.default_value}</Badge>}
                </div>
                {field.choices?.length > 0 ? (
                  <Select
                    value={(draft[groupKey] && draft[groupKey][field.key]) || field.default_value || ''}
                    onChange={e => updateDraft(item.name, groupKey, field.key, e.target.value)}
                  >
                    {!field.required && <option value="">Optional</option>}
                    {field.choices.map(c => <option key={c} value={c}>{c}</option>)}
                  </Select>
                ) : (
                  <Input
                    type={field.secret ? 'password' : 'text'}
                    value={(draft[groupKey] && draft[groupKey][field.key]) || ''}
                    onChange={e => updateDraft(item.name, groupKey, field.key, e.target.value)}
                    placeholder={field.default_value || field.key}
                  />
                )}
                {field.description && <Help>{field.description}</Help>}
              </div>
            ))}
          </div>
        );
      };

      return (
        <Page>
          <PageHeader
            kicker="Operate · Official MCP Registry"
            kickerIcon={I.DB}
            title="Registry Library"
            lede="Search the Official MCP Registry through a Conduit-aware lens — name, publisher, repository, package, secret keys, compatibility, and rollout readiness are all indexed."
            actions={
              <Fragment>
                <Button onClick={clearFilters} disabled={activeFilters.length === 0}>Clear filters</Button>
                <Button variant="primary" onClick={refreshLibrary} disabled={refreshing}>{refreshing ? 'Refreshing…' : 'Refresh library'}</Button>
              </Fragment>
            }
            badges={[
              <Badge key="src" tone={source?.stale ? 'warning' : source?.synced_at ? 'success' : 'default'}>
                {source?.stale ? 'Cached snapshot' : source?.synced_at ? `Synced ${new Date(source.synced_at).toLocaleTimeString()}` : 'Waiting for sync'}
              </Badge>,
              <Badge key="cnt" tone="default">{fmt(totalCount)} indexed · {fmt(filteredCount)} after filters</Badge>,
              <Badge key="vp" tone={(stats.verified_publishers || 0) > 0 ? 'success' : 'default'}>{fmt(stats.verified_publishers || 0)} Verified Publishers</Badge>,
              (stats.healthy_runtime || 0) > 0 ? <Badge key="hr" tone="success">{fmt(stats.healthy_runtime || 0)} healthy runtimes</Badge> : null,
              (stats.policy_blocked || 0) > 0 ? <Badge key="pb" tone="warning">{fmt(stats.policy_blocked || 0)} policy-blocked</Badge> : null,
              copyMsg ? <Badge key="cm" tone={copyMsg === 'Copied' ? 'success' : 'danger'}>{copyMsg}</Badge> : null,
            ].filter(Boolean)}
          />

          <ErrorMsg err={err}/>
          {source?.stale && <Banner tone="warning">Serving cached registry results because the last upstream refresh failed.{source?.last_error ? ` ${source.last_error}` : ''}</Banner>}
          <Notice msg={msg}/>

          {/* ── Toolbar : search + quick filters + sort + collapsible advanced ── */}
          <Card padded>
            <Input
              icon={I.Search}
              type="text"
              value={searchInput}
              onChange={e => setSearchInput(e.target.value)}
              placeholder="github docs, postgres, openai, docker, x-api-key, @scope/package…"
            />
            <div className="ui-row-between" style={{marginTop:'10px', gap:'10px', flexWrap:'wrap'}}>
              <div className="ui-row">
