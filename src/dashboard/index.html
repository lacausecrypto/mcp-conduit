                <button type="button" className="ui-toggle-pill" data-active={autoImportable === 'true' ? 'true' : undefined} onClick={() => setAutoImportable(autoImportable === 'true' ? '' : 'true')}>One-click</button>
                <button type="button" className="ui-toggle-pill" data-active={readiness === 'needs-config' ? 'true' : undefined} onClick={() => setReadiness(readiness === 'needs-config' ? '' : 'needs-config')}>Needs secrets</button>
                <button type="button" className="ui-toggle-pill" data-active={verifiedPublisher === 'true' ? 'true' : undefined} onClick={() => setVerifiedPublisher(verifiedPublisher === 'true' ? '' : 'true')}>Verified</button>
                <button type="button" className="ui-toggle-pill" data-active={runtimeStatus === 'healthy' ? 'true' : undefined} onClick={() => setRuntimeStatus(runtimeStatus === 'healthy' ? '' : 'healthy')}>Healthy</button>
                <button type="button" className="ui-toggle-pill" data-active={installMode === 'remote' ? 'true' : undefined} onClick={() => setInstallMode(installMode === 'remote' ? '' : 'remote')}>Remote</button>
              </div>
              <div className="ui-row">
                <Select value={sort} onChange={e => setSort(e.target.value)} style={{width:'auto', minWidth:'140px'}}>
                  <option value="trust">Sort: Trust</option>
                  <option value="relevance">Sort: Relevance</option>
                  <option value="updated">Sort: Updated</option>
                  <option value="published">Sort: Published</option>
                  <option value="runtime">Sort: Runtime</option>
                  <option value="name">Sort: Name</option>
                </Select>
                <Select value={pageSize} onChange={e => setPageSize(e.target.value)} style={{width:'auto', minWidth:'90px'}}>
                  <option value="12">12 / page</option>
                  <option value="24">24 / page</option>
                  <option value="48">48 / page</option>
                  <option value="96">96 / page</option>
                </Select>
                <Button size="sm" onClick={() => setShowAdvancedFilters(s => !s)}>
                  <I.Filter/> {showAdvancedFilters ? 'Hide filters' : 'More filters'}
                </Button>
              </div>
            </div>

            {activeFilters.length > 0 && (
              <div className="ui-row" style={{marginTop:'10px'}}>
                {activeFilters.map(e => <Chip key={e}>{e}</Chip>)}
              </div>
            )}

            {showAdvancedFilters && (
              <div style={{marginTop:'14px', paddingTop:'14px', borderTop:'1px solid var(--border-subtle)'}}>
                <div className="ui-row-between" style={{marginBottom:'10px'}}>
                  <Label>Operational Filters</Label>
                  <Badge tone={activeFilters.length > 0 ? 'primary' : 'default'}>{activeFilters.length} active</Badge>
                </div>
                <div className="ui-grid-3" style={{gap:'10px'}}>
                  <Field label="Status">
                    <Select value={status} onChange={e => setStatus(e.target.value)}>
                      <option value="">Any</option>
                      {(data?.filters?.statuses || []).map(v => <option key={v} value={v}>{v}</option>)}
                    </Select>
                  </Field>
                  <Field label="Install Mode">
                    <Select value={installMode} onChange={e => setInstallMode(e.target.value)}>
                      <option value="">Any</option>
                      {(data?.filters?.install_modes || ['remote','package','hybrid']).map(v => <option key={v} value={v}>{v}</option>)}
                    </Select>
                  </Field>
                  <Field label="Readiness">
                    <Select value={readiness} onChange={e => setReadiness(e.target.value)}>
                      <option value="">Any</option>
                      {(data?.filters?.readiness_levels || ['ready','needs-config','manual','blocked']).map(v => <option key={v} value={v}>{v}</option>)}
                    </Select>
                  </Field>
                  <Field label="Package Type">
                    <Select value={packageType} onChange={e => setPackageType(e.target.value)}>
                      <option value="">Any</option>
                      {(data?.filters?.package_types || []).map(v => <option key={v} value={v}>{v}</option>)}
                    </Select>
                  </Field>
                  <Field label="Minimum Score">
                    <Select value={minScore} onChange={e => setMinScore(e.target.value)}>
                      <option value="0">Any</option><option value="45">45+</option><option value="70">70+</option><option value="85">85+</option>
                    </Select>
                  </Field>
                  <Field label="Auto Import">
                    <Select value={autoImportable} onChange={e => setAutoImportable(e.target.value)}>
                      <option value="">Any</option><option value="true">Only importable</option><option value="false">Only non-importable</option>
                    </Select>
                  </Field>
                  <Field label="Publisher">
                    <Select value={verifiedPublisher} onChange={e => setVerifiedPublisher(e.target.value)}>
                      <option value="">Any</option><option value="true">Verified only</option><option value="false">Unverified only</option>
                    </Select>
                  </Field>
                  <Field label="Runtime Status">
                    <Select value={runtimeStatus} onChange={e => setRuntimeStatus(e.target.value)}>
                      <option value="">Any</option>
                      {(data?.filters?.runtime_statuses || ['not-imported','healthy','unhealthy']).map(v => <option key={v} value={v}>{v}</option>)}
                    </Select>
                  </Field>
                  <Field label="Policy Fit">
                    <Select value={policyFit} onChange={e => setPolicyFit(e.target.value)}>
                      <option value="">Any</option>
                      {(data?.filters?.policy_fit_statuses || ['allowed','blocked']).map(v => <option key={v} value={v}>{v}</option>)}
                    </Select>
                  </Field>
                  <Field label="Compatible Target">
                    <Select value={compatTarget} onChange={e => setCompatTarget(e.target.value)}>
                      <option value="">Any</option>
                      {(data?.filters?.targets || []).map(v => <option key={v} value={v}>{v}</option>)}
                    </Select>
                  </Field>
                </div>
              </div>
            )}
          </Card>

          {/* ── Install Flow : compact target/scope/profile bar ─────────────── */}
          <div className="ui-install-bar">
            <span className="ui-install-bar-label">Install Flow</span>
            <Select value={target} onChange={e => setTarget(e.target.value)} style={{width:'auto', minWidth:'140px'}}>
              {targets.length === 0 && <option value="">No targets</option>}
              {targets.map(e => <option key={e.id} value={e.id}>{e.label} {e.delivery === 'remote-connector' ? '(remote)' : e.format === 'shell' ? '(shell)' : '(json)'}</option>)}
            </Select>
            <ToggleGroup value={scope} onChange={setScope} options={[{value:'user', label:'User'}, {value:'project', label:'Project'}]}/>
            <Input type="text" value={profileId} onChange={e => setProfileId(e.target.value)} placeholder="profile (optional)" style={{width:'200px'}}/>
            {!isRemoteTarget && (
              <Input type="password" value={authSecret} onChange={e => setAuthSecret(e.target.value)} placeholder="Gateway Token" style={{width:'200px'}}/>
            )}
            <Badge tone="primary" style={{marginLeft:'auto'}}>{selectedTargetLabel} · {isRemoteTarget ? 'remote' : scope}</Badge>
          </div>

          {/* ── Pagination row ──────────────────────────────────────────────── */}
          <div className="ui-row-between" style={{flexWrap:'wrap', gap:'10px'}}>
            <p style={{fontSize:'13px', color:'var(--text-muted)'}}>
              {filteredCount > 0
                ? <Fragment>Showing <strong style={{color:'var(--text)'}}>{fmt(visibleStart)}-{fmt(visibleEnd)}</strong> of <strong style={{color:'var(--text)'}}>{fmt(filteredCount)}</strong>{search.trim() && <Fragment> for <span className="ui-mono">"{search.trim()}"</span></Fragment>} · Page {currentPage}/{totalPages}</Fragment>
                : 'No matches'}
            </p>
            <div className="ui-row">
              <Button size="sm" onClick={() => jumpToOffset(pagination.previous_offset)} disabled={!canGoBack}>Previous</Button>
              <Button size="sm" variant="primary" onClick={() => jumpToOffset(pagination.next_offset)} disabled={!canGoNext}>Next</Button>
            </div>
          </div>

          {/* ── Results grid ────────────────────────────────────────────────── */}
          {loading ? (
            <Card padded><Spinner/></Card>
          ) : items.length === 0 ? (
            <Card padded><Empty icon={I.Search} msg="No registry servers match the current filters"/></Card>
          ) : (
            <div className="ui-registry-grid">
              {items.map(item => {
                const session  = installSessions[item.name];
                const canImport = item.configurable_import && (item.auto_importable || item.readiness === 'needs-config');
                const isBusy = Boolean(importing[item.name]) || Boolean(installing[item.name]);
                const isExpanded = expandedConfig === item.name;
                return (
                  <div key={item.name + '@' + item.version} className="ui-registry-card">
                    <div className="ui-row-between" style={{alignItems:'flex-start', gap:'10px'}}>
                      <div style={{minWidth:0, flex:1}}>
                        <div className="ui-row" style={{gap:'6px', alignItems:'center'}}>
                          <span className="ui-registry-card-title">{item.title}</span>
                          <Chip className="ui-mono">v{item.version}</Chip>
                        </div>
                      </div>
                      <Badge tone={badgeForReadiness(item.readiness)}>{item.readiness}</Badge>
                    </div>

                    <p className="ui-registry-card-desc">{item.description}</p>

                    <div className="ui-row" style={{gap:'4px', flexWrap:'wrap'}}>
                      <Chip strong title="Trust Score"><strong style={{color:'var(--text)'}}>{item.score}</strong>/100</Chip>
                      {item.verified_publisher && <Chip><Dot tone="success"/>verified</Chip>}
                      {item.smart?.runtime?.status && <Chip title="Runtime Health"><Dot tone={item.smart.runtime.status === 'healthy' ? 'success' : item.smart.runtime.status === 'unhealthy' ? 'danger' : 'muted'}/>{item.smart.runtime.status}</Chip>}
                      {item.smart?.policy_fit?.status && item.smart.policy_fit.status !== 'allowed' && <Chip title="Policy Fit">policy {item.smart.policy_fit.status}</Chip>}
                      {item.auto_importable && <Chip strong>one-click</Chip>}
                      <Chip>{item.install_mode}</Chip>
                    </div>

                    <p className="ui-mono ui-registry-card-meta">{item.name} · {item.publisher_label || 'community'}</p>

                    <div className="ui-row" style={{marginTop:'auto', paddingTop:'4px', gap:'6px', flexWrap:'wrap'}}>
                      {item.readiness === 'needs-config' && item.configurable_import ? (
                        <Fragment>
                          <Button size="sm" onClick={() => openConfig(item)} disabled={isBusy}>
                            {isExpanded ? 'Hide' : 'Configure & Add'}
                          </Button>
                          {isExpanded && (
                            <Fragment>
                              <Button size="sm" variant="primary" onClick={() => importServer(item)} disabled={isBusy}>
                                {importing[item.name] ? 'Importing…' : 'Add To Conduit'}
                              </Button>
                              <Button size="sm" onClick={() => installServer(item)} disabled={isBusy}>
                                {installing[item.name] ? 'Preparing…' : `Install in ${selectedTargetLabel}`}
                              </Button>
                            </Fragment>
                          )}
                        </Fragment>
                      ) : (
                        <Fragment>
                          <Button size="sm" variant="primary" onClick={() => importServer(item)} disabled={!canImport || isBusy}>
                            {importing[item.name] ? 'Importing…' : item.auto_importable ? 'Add To Conduit' : 'Manual setup'}
                          </Button>
                          {canImport && (
                            <Button size="sm" onClick={() => installServer(item)} disabled={isBusy}>
                              {installing[item.name] ? 'Preparing…' : `Install in ${selectedTargetLabel}`}
                            </Button>
                          )}
                          {item.repository_url && (
                            <a href={item.repository_url} target="_blank" rel="noreferrer" className="ui-btn" data-size="sm">Source</a>
                          )}
                        </Fragment>
                      )}
                    </div>

                    {item.configurable_import && item.readiness === 'needs-config' && isExpanded && (
                      <div className="ui-banner" data-tone="warning" style={{marginTop:'4px'}}>
                        <p style={{fontSize:'12.5px', fontWeight:600}}>Runtime configuration required</p>
                        <p style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'4px'}}>Values stay on the gateway. Clients only see the Conduit endpoint.</p>
                        <div className="ui-stack" style={{marginTop:'12px', gap:'12px'}}>
                          {renderRequirementGroup(item, 'variables', 'URL Variables')}
                          {renderRequirementGroup(item, 'headers', 'HTTP Headers')}
                          {renderRequirementGroup(item, 'env', 'Process Environment')}
                        </div>
                      </div>
                    )}

                    {session && (
                      <div className="ui-inline" style={{marginTop:'4px'}}>
                        {session.delivery === 'remote-connector' ? (
                          <Fragment>
                            <div className="ui-row-between">
                              <p style={{fontSize:'12.5px', fontWeight:600}}>Remote handoff ready</p>
                              <Badge tone={session.remote_ready ? 'success' : 'warning'}>{session.remote_ready ? 'ready' : 'blocked'}</Badge>
                            </div>
                            {session.blockers?.length > 0 && <div style={{marginTop:'8px'}}><Banner>{session.blockers[0]}</Banner></div>}
                            <p className="ui-mono" style={{fontSize:'11.5px', wordBreak:'break-word', marginTop:'8px', color:'var(--text-muted)'}}>{session.profile_url}</p>
                            <div className="ui-row" style={{marginTop:'8px'}}>
                              <Button size="sm" onClick={() => copyText(session.profile_url)}><I.Copy/> Copy URL</Button>
                              <Button size="sm" variant="primary" onClick={() => runRemoteHandoff(session)}>One-click handoff</Button>
                            </div>
                          </Fragment>
                        ) : (
                          <Fragment>
                            <div className="ui-row-between">
                              <p style={{fontSize:'12.5px', fontWeight:600}}>Bundle ready</p>
                              <Badge tone="success">{session.scope_effective}</Badge>
                            </div>
                            <p className="ui-mono" style={{fontSize:'11.5px', wordBreak:'break-word', marginTop:'8px', color:'var(--text-muted)'}}>{session.install_command}</p>
                            <div className="ui-row" style={{marginTop:'8px'}}>
                              <Button size="sm" onClick={() => copyText(session.install_command)}><I.Copy/> Copy command</Button>
                              {session.deeplink && <a href={session.deeplink} className="ui-btn" data-variant="primary" data-size="sm">Open installer</a>}
                            </div>
                          </Fragment>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── Bottom pagination ───────────────────────────────────────────── */}
          {!loading && items.length > 0 && (
            <div className="ui-row-between" style={{flexWrap:'wrap', gap:'10px'}}>
              <p style={{fontSize:'12.5px', color:'var(--text-subtle)'}}>
                Source: <span className="ui-mono">{source?.base_url || '—'}</span>
                {source?.synced_at && <Fragment> · last sync {new Date(source.synced_at).toLocaleString()}</Fragment>}
                {' · '}{latestOnlyLabel}
              </p>
              <div className="ui-row">
                <Button size="sm" onClick={() => jumpToOffset(pagination.previous_offset)} disabled={!canGoBack}>Previous</Button>
                <Button size="sm" variant="primary" onClick={() => jumpToOffset(pagination.next_offset)} disabled={!canGoNext}>Next</Button>
              </div>
            </div>
          )}
        </Page>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // VIEW · Connect
    // ════════════════════════════════════════════════════════════════════════
    function ConnectView({ adminKey }) {
      const [catalog, setCatalog]                 = useState(null);
      const [target, setTarget]                   = useState('cursor');
      const [profile, setProfile]                 = useState('default');
      const [scope, setScope]                     = useState('user');
      const [data, setData]                       = useState(null);
      const [catalogVersion, setCatalogVersion]   = useState(0);
      const [authSecret, setAuthSecret]           = useState('');
      const [installSession, setInstallSession]   = useState(null);
      const [importUrl, setImportUrl]             = useState('');
      const [importJson, setImportJson]           = useState('');
      const [importProfile, setImportProfile]     = useState('');
      const [importTemplates, setImportTemplates] = useState([]);
      const [importMsg, setImportMsg]             = useState('');
      const [loading, setLoading]                 = useState(true);
      const [exporting, setExporting]             = useState(true);
      const [creatingInstall, setCreatingInstall] = useState(false);
      const [importing, setImporting]             = useState(false);
      const [err, setErr]                         = useState(null);
      const [copyMsg, setCopyMsg]                 = useState('');
      const [tab, setTab]                         = useState('export');

      useEffect(() => {
        let alive = true;
        async function loadCatalog() {
          setLoading(true); setErr(null);
          try {
            const [d, t] = await Promise.all([
              apiFetch('/connect/catalog', adminKey),
              apiFetch('/connect/import/catalog', adminKey),
            ]);
            if (!alive) return;
            setCatalog(d);
            setImportTemplates(t.templates || []);
            if (d?.targets?.length > 0  && !d.targets.some(x => x.id === target))   setTarget(d.targets[0].id);
            if (d?.profiles?.length > 0 && !d.profiles.some(x => x.id === profile)) setProfile(d.profiles[0].id);
          } catch (e) { if (alive) setErr(e.message); }
          if (alive) setLoading(false);
        }
        loadCatalog();
        return () => { alive = false; };
      }, [adminKey, catalogVersion]);

      useEffect(() => {
        if (!target || !profile) return;
        let alive = true;
        async function loadExport() {
          setExporting(true); setErr(null); setCopyMsg(''); setInstallSession(null);
          try {
            const q = '?target=' + encodeURIComponent(target) + '&profile=' + encodeURIComponent(profile) + '&scope=' + encodeURIComponent(scope);
            const d = await apiFetch('/connect/export' + q, adminKey);
            if (alive) setData(d);
          } catch (e) { if (alive) setErr(e.message); }
          if (alive) setExporting(false);
        }
        loadExport();
        return () => { alive = false; };
      }, [adminKey, target, profile, scope, catalogVersion]);

      const copy = async (text) => {
        try { await navigator.clipboard.writeText(text); setCopyMsg('Copied'); setTimeout(() => setCopyMsg(''), 1500); }
        catch { setCopyMsg('Copy failed'); setTimeout(() => setCopyMsg(''), 1500); }
      };

      const runRemoteHandoff = async (session, pendingWindow) => {
        try {
          if (session?.profile_url) {
            await navigator.clipboard.writeText(session.profile_url);
            setCopyMsg('Profile URL copied');
            setTimeout(() => setCopyMsg(''), 1500);
          }
        } catch {}
        if (session?.settings_url) {
          if (pendingWindow) pendingWindow.location = session.settings_url;
          else window.open(session.settings_url, '_blank', 'noopener');
        } else if (pendingWindow) pendingWindow.close();
      };

      const createInstall = async () => {
        setCreatingInstall(true); setErr(null); setInstallSession(null);
        const remoteTarget = (catalog?.targets || []).find(e => e.id === target)?.delivery === 'remote-connector';
        const pendingWindow = remoteTarget ? window.open('about:blank', '_blank') : null;
        try {
          const session = await apiPost(remoteTarget ? '/connect/remote/session' : '/connect/install/session', adminKey, {
            target, profile, scope,
            base_url: data?.base_url,
            ...(!remoteTarget && needsSecret ? { auth_secret: authSecret } : {}),
          });
          setInstallSession(session);
          if (remoteTarget) await runRemoteHandoff(session, pendingWindow);
        } catch (e) { if (pendingWindow) pendingWindow.close(); setErr(e.message); }
        setCreatingInstall(false);
      };

      const importDescriptor = async () => {
        setImporting(true); setErr(null); setImportMsg('');
        try {
          const body = {
            ...(importUrl.trim() ? { descriptor_url: importUrl.trim() } : {}),
            ...(importJson.trim() ? { descriptor: JSON.parse(importJson) } : {}),
            ...(importProfile.trim() ? { profile_id: importProfile.trim() } : {}),
          };
          if (!body.descriptor_url && !body.descriptor) throw new Error('Provide a descriptor URL or paste descriptor JSON');
          const result = await apiPost('/connect/import', adminKey, body);
          const imported = (result.imported_servers || []).length;
          const skipped  = (result.skipped_servers  || []).length;
          setImportMsg(`Imported ${imported} server${imported !== 1 ? 's' : ''}${skipped ? `, skipped ${skipped}` : ''}.`);
          setCatalogVersion(v => v + 1);
          if (importProfile.trim()) setProfile(importProfile.trim());
        } catch (e) { setErr(e.message); }
        setImporting(false);
      };

      if (loading) return <Page><div style={{padding:'var(--sp-7)'}}><Spinner/></div></Page>;

      const targets = catalog?.targets || [];
      const profiles = catalog?.profiles || [];
      const selectedProfile = profiles.find(p => p.id === profile);
      const selectedTarget  = targets.find(e => e.id === target);
      const targetDelivery  = selectedTarget?.delivery || 'local-helper';
      const isRemoteTarget  = targetDelivery === 'remote-connector';
      const envItems        = data?.env || [];
      const mappedServers   = data?.servers || [];
      const notes           = data?.notes || [];
      const needsSecret     = Boolean(envItems.length);
      const canCreateInstall = !creatingInstall && (isRemoteTarget || !needsSecret || authSecret.trim().length > 0);
      const cliCommand      = `conduit connect export --target ${target} --profile ${profile} --scope ${scope}`;

      return (
        <Page>
          <PageHeader
            kicker="Operate"
            kickerIcon={I.Plug}
            title="Connect"
            lede="Generate ready-to-paste MCP client snippets, import external descriptors, or trigger a Conduit-controlled distribution flow for local helpers or remote connectors."
            badges={[
              <Badge key="tg" tone="primary">{selectedTarget?.label || target}</Badge>,
              <Badge key="dl" tone={isRemoteTarget ? 'primary' : 'default'}>{isRemoteTarget ? 'Remote connector' : 'Local helper'}</Badge>,
              <Badge key="ne" tone={needsSecret ? 'warning' : 'success'}>{needsSecret ? `${envItems.length} env var${envItems.length !== 1 ? 's' : ''}` : 'No client secret required'}</Badge>,
              <Badge key="ms" tone="default">{mappedServers.length} mapped server{mappedServers.length !== 1 ? 's' : ''}</Badge>,
              copyMsg && <Badge key="cm" tone={copyMsg === 'Copied' ? 'success' : 'danger'}>{copyMsg}</Badge>,
            ].filter(Boolean)}
          />

          <StatsRow>
            <StatTile label="Target"    value={selectedTarget?.label || '—'} sub={data?.format === 'shell' ? 'shell output' : 'JSON output'}/>
            <StatTile label="Placement" value={data?.placement || '—'} sub={isRemoteTarget ? targetDelivery : (data?.scope_effective || scope)}/>
            <StatTile label="Profile"   value={selectedProfile?.label || profile} sub={`${mappedServers.length} routed server${mappedServers.length !== 1 ? 's' : ''}`}/>
            <StatTile label="Secrets"   value={needsSecret ? String(envItems.length) : '0'} sub={isRemoteTarget ? 'remote handoff blockers may apply' : needsSecret ? 'client env vars expected' : 'nothing extra required'}/>
          </StatsRow>

          <ErrorMsg err={err}/>
          <Notice msg={importMsg}/>

          <Tabs
            value={tab}
            onChange={setTab}
            options={[
              { value: 'export',  icon: I.Plug,   label: 'Export', badge: <Badge tone="default">{mappedServers.length}</Badge> },
              { value: 'import',  icon: I.Server, label: 'Add To Conduit' },
              { value: 'install', icon: I.Key,    label: isRemoteTarget ? 'Remote Handoff' : 'Install Bundle' },
            ]}
          />

          {tab === 'export' && (
            <Section
              icon={I.Plug}
              title="Export client config"
              copy="Pick a target and profile, then copy the snippet directly to your IDE."
              meta={
                <div className="ui-row">
                  <Button size="sm" onClick={() => copy(data?.snippet || '')} disabled={!data?.snippet || exporting}>
                    <I.Copy/> {exporting ? 'Rendering…' : 'Copy snippet'}
                  </Button>
                  <Button size="sm" onClick={() => copy(cliCommand)}><I.Copy/> Copy CLI</Button>
                </div>
              }
            >
              <Label>Target</Label>
              <div className="ui-grid-4" style={{gap:'8px', marginTop:'6px', marginBottom:'14px'}}>
                {targets.map(e => (
                  <ChoiceCard key={e.id} active={target === e.id} label={e.label} sub={e.delivery === 'remote-connector' ? 'remote' : e.format === 'shell' ? 'shell' : 'json'} onClick={() => setTarget(e.id)}/>
                ))}
              </div>

              <div className="ui-grid-2-equal">
                <Field label="Profile">
                  <Select value={profile} onChange={e => setProfile(e.target.value)}>
                    {profiles.map(e => <option key={e.id} value={e.id}>{e.label}</option>)}
                  </Select>
                </Field>
                <Field label="Scope">
                  <ToggleGroup value={scope} onChange={setScope} options={[{value:'user', label:'User'}, {value:'project', label:'Project'}]}/>
                </Field>
                {needsSecret && !isRemoteTarget && (
                  <Field label="Gateway Token" full>
                    <Input type="password" value={authSecret} onChange={e => setAuthSecret(e.target.value)} placeholder="Bearer token or API key"/>
                    <Help>Used only to build the local install manifest. Never written into the generated config.</Help>
                  </Field>
                )}
              </div>

              <div style={{marginTop:'14px'}}>
                <div className="ui-row-between" style={{marginBottom:'6px'}}>
                  <Label>{data?.title || 'Snippet'}</Label>
                  {data?.base_url && <span className="ui-mono" style={{fontSize:'11px', color:'var(--text-subtle)'}}>{data.base_url}</span>}
                </div>
                {exporting ? <Spinner/> : <pre className="ui-mono ui-code">{data?.snippet || ''}</pre>}
              </div>

              {(envItems.length > 0 || mappedServers.length > 0) && (
                <div className="ui-grid-2" style={{marginTop:'14px'}}>
                  {envItems.length > 0 && (
                    <div>
                      <Label>Environment ({envItems.length})</Label>
                      <div className="ui-stack-xs" style={{marginTop:'6px'}}>
                        {envItems.map(item => (
                          <div key={item.name} className="ui-list-item-flat">
                            <div>
                              <p className="ui-mono" style={{fontSize:'12.5px', fontWeight:600}}>{item.name}</p>
                              <p style={{fontSize:'11.5px', color:'var(--text-muted)', marginTop:'2px'}}>{item.description}</p>
                            </div>
                            <Button size="sm" onClick={() => copy(item.name)}><I.Copy/></Button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {mappedServers.length > 0 && (
                    <div>
                      <Label>Mapped servers ({mappedServers.length})</Label>
                      <div className="ui-stack-xs" style={{marginTop:'6px'}}>
                        {mappedServers.map(server => (
                          <div key={server.id} className="ui-list-item-flat">
                            <div>
                              <p style={{fontSize:'12.5px', fontWeight:500}}>{server.alias}</p>
                              <p className="ui-mono" style={{fontSize:'11px', color:'var(--text-subtle)', marginTop:'2px'}}>{server.url}</p>
                            </div>
                            <Badge>{server.id}</Badge>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {notes.length > 0 && (
                <div style={{marginTop:'14px', paddingTop:'14px', borderTop:'1px solid var(--border-subtle)'}}>
                  <Label>Notes</Label>
                  <div className="ui-notes" style={{marginTop:'6px'}}>
                    {notes.map((note, idx) => <Note key={idx}>{note}</Note>)}
                  </div>
                </div>
              )}
            </Section>
          )}

          {tab === 'import' && (
            <Section
              icon={I.Server}
              title="Add To Conduit"
              copy="Import a descriptor URL or paste JSON to register a new MCP server."
            >
              <div className="ui-stack-sm">
                <Field label="Descriptor URL">
                  <Input type="text" value={importUrl} onChange={e => setImportUrl(e.target.value)} placeholder="https://example.com/.well-known/mcp-server.json"/>
                </Field>
                <Field label="Descriptor JSON">
                  <Textarea value={importJson} onChange={e => setImportJson(e.target.value)} rows={8} placeholder='{"version":1,"servers":[...]}' style={{minHeight:'140px'}}/>
                </Field>
                <Field label="Attach to profile">
                  <Input type="text" value={importProfile} onChange={e => setImportProfile(e.target.value)} placeholder="optional-profile-id"/>
                  <Help>Useful when the imported server should immediately appear in a curated connect profile.</Help>
                </Field>
              </div>

              {importTemplates.length > 0 && (
                <div style={{marginTop:'14px'}}>
                  <Label>Templates</Label>
                  <div className="ui-stack-xs" style={{marginTop:'6px'}}>
                    {importTemplates.map(template => (
                      <div key={template.id} className="ui-list-item-flat">
                        <div>
                          <p style={{fontSize:'13px', fontWeight:500}}>{template.label}</p>
                          <p style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'2px'}}>{template.description}</p>
                        </div>
                        <Button size="sm" onClick={() => { setImportJson(JSON.stringify(template.example_descriptor, null, 2)); setImportUrl(''); }}>Use</Button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <Button variant="primary" onClick={importDescriptor} disabled={importing} style={{marginTop:'14px'}}>
                {importing ? 'Importing…' : 'Add server to Conduit'}
              </Button>
            </Section>
          )}

          {tab === 'install' && (
            <Section
              icon={I.Key}
              tone="success"
              title={isRemoteTarget ? 'Create remote handoff' : 'Create install bundle'}
              copy={isRemoteTarget
                ? 'Short-lived Conduit-controlled handoff for remote connectors.'
                : 'Short-lived bundle that launches a local Conduit relay in the IDE.'}
              meta={<Badge tone={canCreateInstall ? 'success' : 'warning'}>{canCreateInstall ? 'Ready' : 'Needs input'}</Badge>}
            >
              {needsSecret && !authSecret.trim() && !isRemoteTarget && (
                <Banner>A gateway token is required because Conduit auth is enabled. Set it in the <strong>Export</strong> tab.</Banner>
              )}
              {isRemoteTarget && needsSecret && (
                <Banner tone="warning">Remote connectors are blocked because Conduit auth is enabled. Use a public authless endpoint or add an OAuth bridge.</Banner>
              )}

              <Button block variant="primary" onClick={createInstall} disabled={!canCreateInstall} style={{marginTop: needsSecret ? '14px' : '0'}}>
                {creatingInstall ? (isRemoteTarget ? 'Preparing handoff…' : 'Creating bundle…') : (isRemoteTarget ? 'Create one-click remote handoff' : 'Create local install bundle')}
              </Button>

              {installSession && (
                <div className="ui-inline" style={{marginTop:'14px'}}>
                  {installSession.delivery === 'remote-connector' ? (
                    <Fragment>
                      <div className="ui-row-between">
                        <div>
                          <p style={{fontSize:'13px', fontWeight:600}}>Remote handoff ready for {installSession.target_label}</p>
                          <p style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'2px'}}>Expires {new Date(installSession.expires_at).toLocaleString()}</p>
                        </div>
                        <Badge tone={installSession.remote_ready ? 'success' : 'warning'}>{installSession.remote_ready ? 'ready' : 'blocked'}</Badge>
                      </div>
                      {installSession.blockers?.length > 0 && <div style={{marginTop:'10px'}}><Banner>{installSession.blockers[0]}</Banner></div>}
                      <div className="ui-stack-sm" style={{marginTop:'12px'}}>
                        <div>
                          <Label>Conduit profile URL</Label>
                          <p className="ui-mono" style={{fontSize:'12px', wordBreak:'break-word', marginTop:'4px'}}>{installSession.profile_url}</p>
                        </div>
                        <div>
                          <Label>Target handoff</Label>
                          <p className="ui-mono" style={{fontSize:'12px', wordBreak:'break-word', marginTop:'4px'}}>{installSession.settings_label} · {installSession.settings_url}</p>
                        </div>
                        <div className="ui-row">
                          <Button size="sm" onClick={() => copy(installSession.profile_url)}><I.Copy/> Copy URL</Button>
                          <Button size="sm" onClick={() => copy(installSession.snippet)}><I.Copy/> Copy manifest</Button>
                          <Button size="sm" variant="primary" onClick={() => runRemoteHandoff(installSession)}>One-click handoff</Button>
                        </div>
                      </div>
                    </Fragment>
                  ) : (
                    <Fragment>
                      <div className="ui-row-between">
                        <div>
                          <p style={{fontSize:'13px', fontWeight:600}}>Bundle ready for {installSession.target_label}</p>
                          <p style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'2px'}}>Expires {new Date(installSession.expires_at).toLocaleString()}</p>
                        </div>
                        <Badge tone="primary">{installSession.scope_effective}</Badge>
                      </div>
                      <div className="ui-stack-sm" style={{marginTop:'12px'}}>
                        <div>
                          <Label>Install command</Label>
                          <p className="ui-mono" style={{fontSize:'12px', wordBreak:'break-word', marginTop:'4px'}}>{installSession.install_command}</p>
                        </div>
                        {installSession.deeplink && (
                          <div>
                            <Label>Helper deeplink</Label>
                            <p className="ui-mono" style={{fontSize:'12px', wordBreak:'break-word', marginTop:'4px'}}>{installSession.deeplink}</p>
                          </div>
                        )}
                        <div className="ui-row">
                          <Button size="sm" onClick={() => copy(installSession.install_command)}><I.Copy/> Copy command</Button>
                          {installSession.deeplink && <Button size="sm" onClick={() => copy(installSession.deeplink)}><I.Copy/> Copy deeplink</Button>}
                          {installSession.deeplink && <Button size="sm" variant="primary" onClick={() => { window.location.href = installSession.deeplink; }}>Open installer</Button>}
                        </div>
                      </div>
                    </Fragment>
                  )}
                </div>
              )}
            </Section>
          )}
        </Page>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // Navigation
    // ════════════════════════════════════════════════════════════════════════
    const NAV_SECTIONS = [
      {
        label: 'Observe',
        items: [
          { id: 'overview', label: 'Overview',          Icon: I.Activity },
          { id: 'logs',     label: 'Logs',              Icon: I.List },
          { id: 'servers',  label: 'Servers & Cache',   Icon: I.Server },
        ],
      },
      {
        label: 'Operate',
        items: [
          { id: 'limits',   label: 'Access & Limits',   Icon: I.Shield },
          { id: 'registry', label: 'Registry',          Icon: I.DB },
          { id: 'connect',  label: 'Connect',           Icon: I.Plug },
          { id: 'settings', label: 'Settings',          Icon: I.Settings },
        ],
      },
    ];

    const VIEW_META = {
      overview: { title: 'Overview',         group: 'Observe' },
      logs:     { title: 'Request Logs',     group: 'Observe' },
      servers:  { title: 'Servers & Cache',  group: 'Observe' },
      cache:    { title: 'Servers & Cache',  group: 'Observe' },
      limits:   { title: 'Access & Limits',  group: 'Operate' },
      acl:      { title: 'Access & Limits',  group: 'Operate' },
      registry: { title: 'Registry Library', group: 'Operate' },
      connect:  { title: 'Connect',          group: 'Operate' },
      settings: { title: 'Settings',         group: 'Operate' },
    };

    // ════════════════════════════════════════════════════════════════════════
    // Sidebar
    // ════════════════════════════════════════════════════════════════════════
    function Sidebar({ view, onSelect, mobileOpen, onMobileClose }) {
      return (
        <aside className="ui-sidebar" data-mobile-open={mobileOpen ? 'true' : undefined}>
          <div className="ui-sidebar-head">
            <div className="ui-brand">
              <div className="ui-brand-mark"><I.Conduit/></div>
              <div style={{minWidth:0}}>
                <p className="ui-brand-name">Conduit</p>
                <p className="ui-brand-tag">Operator workbench</p>
              </div>
            </div>
          </div>

          <nav className="ui-nav">
            {NAV_SECTIONS.map(section => (
              <div key={section.label} className="ui-nav-section">
                <p className="ui-nav-section-label">{section.label}</p>
                <div style={{display:'flex', flexDirection:'column', gap:'1px', width:'100%'}}>
                  {section.items.map(({ id, label, Icon }) => (
                    <button
                      key={id}
                      onClick={() => { onSelect(id); onMobileClose?.(); }}
                      className="ui-nav-item"
                      data-active={view === id ? 'true' : undefined}
                      title={label}
                    >
                      <span className="ui-nav-icon"><Icon/></span>
                      <span>{label}</span>
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </nav>

          <div className="ui-sidebar-foot">
            <Chip>Local runtime</Chip>
            <Chip className="ui-mono">v1.1.0</Chip>
          </div>
        </aside>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // Login Modal
    // ════════════════════════════════════════════════════════════════════════
    function LoginModal({ onSave }) {
      const [k, setK] = useState('');
      return (
        <div className="ui-overlay anim-fade" style={{zIndex:100}}>
          <div className="ui-login anim-pop">
            <div style={{marginBottom:'18px'}}>
              <div className="ui-icon-shell" data-size="lg" style={{marginBottom:'14px'}}><I.Key/></div>
              <p style={{fontWeight:600, fontSize:'18px', letterSpacing:'-0.018em'}}>Sign in to Conduit</p>
              <p style={{fontSize:'13px', color:'var(--text-muted)', marginTop:'4px'}}>Enter your admin key to continue.</p>
            </div>
            <div className="ui-stack-xs" style={{marginBottom:'14px'}}>
              <Label>Admin Key</Label>
              <Input
                type="password" value={k} onChange={e => setK(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && k && onSave(k)}
                placeholder="••••••••••••" autoFocus
              />
            </div>
            <Button block variant="primary" onClick={() => k && onSave(k)} disabled={!k}>
              Authenticate
            </Button>
            <p style={{textAlign:'center', marginTop:'14px', fontSize:'11px', color:'var(--text-subtle)'}}>
              <span className="ui-mono">mcp-conduit</span> · v1.1.0
            </p>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // Top bar
    // ════════════════════════════════════════════════════════════════════════
    function TopBar({ view, onChangeKey, secSince, onMobileMenu }) {
      const meta = VIEW_META[view] || { title: view, group: 'Dashboard' };
      const refreshLabel = secSince === 0 ? 'updated just now' : `updated ${secSince}s ago`;
      return (
        <header className="ui-topbar">
          <div className="ui-topbar-meta">
            <button type="button" className="ui-hamburger" aria-label="Open menu" onClick={onMobileMenu}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
            </button>
            <span className="ui-topbar-eyebrow">{meta.group}</span>
            <span className="ui-topbar-sep">/</span>
            <span className="ui-topbar-title">{meta.title}</span>
          </div>
          <div className="ui-topbar-actions">
            <span className="ui-status-pill">
              <span className="ui-dot" data-tone="success" style={{opacity: secSince < 3 ? 1 : 0.4, transition:'opacity 0.4s var(--ease)'}}/>
              <span>{refreshLabel}</span>
            </span>
            <IconBtn label="Change admin key" onClick={onChangeKey}><I.Key/></IconBtn>
          </div>
        </header>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // App root
    // ════════════════════════════════════════════════════════════════════════
    function App() {
      const [view, setView]           = useState('overview');
      const [adminKey, setAdminKey]   = useState('');
      const [showLogin, setShowLogin] = useState(false);
      const [tick, setTick]           = useState(0);
      const [lastTs, setLastTs]       = useState(Date.now());
      const [secSince, setSecSince]   = useState(0);
      const [mobileOpen, setMobileOpen] = useState(false);

      useEffect(() => {
        const id = setInterval(() => { setTick(t => t + 1); setLastTs(Date.now()); setSecSince(0); }, REFRESH_MS);
        return () => clearInterval(id);
      }, []);
      useEffect(() => {
        const id = setInterval(() => setSecSince(Math.floor((Date.now() - lastTs) / 1000)), 1000);
        return () => clearInterval(id);
      }, [lastTs]);
      useEffect(() => {
        apiFetch('/stats', adminKey).catch(e => { if (e.message === 'UNAUTHORIZED') setShowLogin(true); });
      }, []); // eslint-disable-line
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') setMobileOpen(false); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const saveKey = (k) => { setAdminKey(k); setShowLogin(false); setTick(t => t + 1); };
      const props = { adminKey, tick };

      return (
        <Fragment>
          {showLogin && <LoginModal onSave={saveKey}/>}
          <div className="ui-shell">
            <Sidebar view={view} onSelect={setView} mobileOpen={mobileOpen} onMobileClose={() => setMobileOpen(false)}/>
            {mobileOpen && <div className="ui-mobile-scrim" onClick={() => setMobileOpen(false)}/>}
            <div className="ui-stage">
              <TopBar view={view} onChangeKey={() => setShowLogin(true)} secSince={secSince} onMobileMenu={() => setMobileOpen(true)}/>
              <main className="ui-main">
                {view === 'overview' && <OverviewView   {...props}/>}
                {view === 'logs'     && <LogsView       {...props}/>}
                {view === 'servers'  && <ServersView    {...props}/>}
                {view === 'cache'    && <CacheView      {...props}/>}
                {view === 'limits'   && <LimitsView     {...props}/>}
                {view === 'acl'      && <AclView        {...props}/>}
                {view === 'registry' && <RegistryView   {...props}/>}
                {view === 'connect'  && <ConnectView    {...props}/>}
                {view === 'settings' && <SettingsView   {...props}/>}
              </main>
            </div>
          </div>
        </Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
