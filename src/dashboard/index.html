<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0b0d">
  <title>Conduit Dashboard</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500,600,700|jetbrains-mono:400,500&display=swap">
  <style>
    /* ════════════════════════════════════════════════════════════════════════
       CONDUIT DASHBOARD · "Operator Slate"
       shadcn/Geist neutrals · Linear density · Supabase depth-by-borders
       Cyan accent · 1px solid hairlines · zero blur · zero gradient hero
       ════════════════════════════════════════════════════════════════════════ */

    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    button, input, select, textarea { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    table { border-collapse: collapse; }
    svg { display: block; }

    /* ── Tokens ────────────────────────────────────────────────────────────── */
    :root {
      color-scheme: dark;

      /* Surfaces */
      --bg:            #0a0b0d;
      --bg-elevated:   #0f1115;
      --surface:       #111317;
      --surface-2:     #16191e;
      --surface-3:     #1c2026;

      /* Borders */
      --border:        #20242b;
      --border-strong: #2a2f37;
      --border-subtle: #181b20;

      /* Text */
      --text:          #e6e8eb;
      --text-muted:    #9aa3ad;
      --text-subtle:   #5f6770;
      --text-disabled: #3a4048;
      --text-on-accent:#07131c;

      /* Accent (cyan) */
      --accent:        #4cc2ff;
      --accent-hover:  #6fcfff;
      --accent-active: #2fb3f5;
      --accent-soft:   rgba(76, 194, 255, 0.10);
      --accent-soft-2: rgba(76, 194, 255, 0.16);
      --accent-ring:   rgba(76, 194, 255, 0.32);
      --accent-border: rgba(76, 194, 255, 0.40);

      /* Semantic */
      --success:       #3ecf8e;
      --success-soft:  rgba(62, 207, 142, 0.12);
      --success-border:rgba(62, 207, 142, 0.30);
      --warning:       #f5a524;
      --warning-soft:  rgba(245, 165, 36, 0.12);
      --warning-border:rgba(245, 165, 36, 0.30);
      --danger:        #ef4444;
      --danger-soft:   rgba(239, 68, 68, 0.12);
      --danger-border: rgba(239, 68, 68, 0.30);
      --info:          var(--accent);
      --info-soft:     var(--accent-soft);
      --info-border:   var(--accent-border);

      /* Radii */
      --r-1: 4px;
      --r-2: 6px;
      --r-3: 8px;
      --r-pill: 999px;

      /* Spacing — 4px base */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-7: 28px;
      --sp-8: 32px;
      --sp-9: 36px;
      --sp-10: 40px;
      --sp-12: 48px;

      /* Typography */
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;

      --fs-display: 22px;  --lh-display: 28px;  --ls-display: -0.02em;
      --fs-h2:      18px;  --lh-h2:      24px;  --ls-h2:      -0.014em;
      --fs-title:   14px;  --lh-title:   20px;  --ls-title:   -0.005em;
      --fs-body:    13px;  --lh-body:    20px;
      --fs-label:   11px;  --lh-label:   14px;  --ls-label:   0.04em;
      --fs-small:   11px;  --lh-small:   15px;
      --fs-mono-sm: 12px;  --lh-mono-sm: 18px;
      --fs-mono-md: 13px;  --lh-mono-md: 20px;

      --fw-regular:  400;
      --fw-medium:   500;
      --fw-semibold: 600;
      --fw-bold:     700;

      /* Elevation — used only for dialogs/popovers */
      --shadow-dialog:  0 8px 32px rgba(0, 0, 0, 0.6);
      --shadow-popover: 0 4px 16px rgba(0, 0, 0, 0.5);

      /* Motion */
      --ease:      cubic-bezier(0.2, 0.8, 0.2, 1);
      --ease-out:  cubic-bezier(0.32, 0.72, 0, 1);
      --dur-fast:  90ms;
      --dur-base:  160ms;
      --dur-slow:  240ms;

      /* Layout */
      --sidebar-w:           240px;
      --sidebar-w-collapsed: 56px;
      --topbar-h:            48px;
      --row-h:               32px;
      --btn-h-sm:            28px;
      --btn-h-md:            32px;
      --input-h:             32px;
      --content-pad-l:       40px;
      --content-pad-r:       32px;
      --content-pad-x:       32px;
      --content-pad-y:       20px;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      letter-spacing: -0.003em;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01', 'ss03';
    }

    /* Scrollbars — minimal */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--surface-3);
      border-radius: var(--r-pill);
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); background-clip: content-box; }
    * { scrollbar-width: thin; scrollbar-color: var(--surface-3) transparent; }

    ::selection { background: var(--accent-soft-2); color: var(--text); }
    :focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-ring);
      border-radius: var(--r-2);
    }

    /* ── Animations ────────────────────────────────────────────────────────── */
    @keyframes ds-spin    { to { transform: rotate(360deg); } }
    @keyframes ds-pulse   { 0%,100% { box-shadow: 0 0 0 0 rgba(62, 207, 142, 0.40); } 50% { box-shadow: 0 0 0 6px rgba(62, 207, 142, 0); } }
    @keyframes ds-fade    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ds-rise    { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes ds-pop     { from { opacity: 0; transform: translateY(6px) scale(0.985); } to { opacity: 1; transform: none; } }

    .anim-spin  { animation: ds-spin 0.75s linear infinite; }
    .anim-pulse { animation: ds-pulse 2s var(--ease) infinite; }
    .anim-fade  { animation: ds-fade var(--dur-fast) var(--ease); }
    .anim-rise  { animation: ds-rise var(--dur-base) var(--ease); }
    .anim-pop   { animation: ds-pop var(--dur-slow) var(--ease); }

    @media (prefers-reduced-motion: reduce) {
      *,*::before,*::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ════════════════════════════════════════════════════════════════════════
       APP SHELL
       ════════════════════════════════════════════════════════════════════════ */
    .ui-app {
      display: flex;
      min-height: 100vh;
      width: 100%;
      max-width: 100vw;
      background: var(--bg);
      overflow-x: hidden;
    }
    .ui-shell {
      display: flex;
      flex: 1;
      min-width: 0;
      min-height: 100vh;
    }
    .ui-stage {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      max-width: 100%;
      background: var(--bg);
      border-left: 1px solid var(--border);
      overflow-x: hidden;
    }
    .ui-main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 0 var(--sp-10);
    }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */
    .ui-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }
    .ui-sidebar-head {
      padding: var(--sp-4) var(--sp-4) var(--sp-3);
      border-bottom: 1px solid var(--border);
    }
    .ui-brand {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }
    .ui-brand-mark {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      border-radius: var(--r-2);
      background: var(--surface-3);
      color: var(--accent);
      display: grid;
      place-items: center;
      border: 1px solid var(--border-strong);
    }
    .ui-brand-name {
      font-size: var(--fs-title);
      line-height: var(--lh-title);
      letter-spacing: var(--ls-title);
      font-weight: var(--fw-semibold);
      color: var(--text);
    }
    .ui-brand-tag {
      margin-top: 1px;
      font-size: var(--fs-small);
      color: var(--text-subtle);
      letter-spacing: 0.005em;
    }
    .ui-nav {
      flex: 1;
      padding: var(--sp-3) var(--sp-2);
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
      overflow-y: auto;
    }
    .ui-nav-section { display: flex; flex-direction: column; gap: 1px; }
    .ui-nav-section + .ui-nav-section {
      margin-top: var(--sp-3);
      padding-top: var(--sp-3);
      border-top: 1px solid var(--border-subtle);
    }
    .ui-nav-section-label {
      padding: 0 var(--sp-2) var(--sp-1);
      font-size: var(--fs-label);
      line-height: var(--lh-label);
      font-weight: var(--fw-medium);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--text-subtle);
    }
    .ui-nav-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      width: 100%;
      height: 28px;
      padding: 0 var(--sp-2);
      border-radius: var(--r-2);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }
    .ui-nav-item:hover { background: var(--surface-2); color: var(--text); }
    .ui-nav-item[data-active="true"] {
      background: var(--surface-3);
      color: var(--text);
    }
    .ui-nav-item[data-active="true"]::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 16px;
      background: var(--accent);
      border-radius: var(--r-pill);
    }
    .ui-nav-item[data-active="true"] .ui-nav-icon { color: var(--accent); }
    .ui-nav-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-subtle);
      transition: color var(--dur-fast) var(--ease);
    }
    .ui-nav-item:hover .ui-nav-icon { color: var(--text-muted); }
    .ui-sidebar-foot {
      padding: var(--sp-3) var(--sp-4);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
    }

    /* ── Topbar ───────────────────────────────────────────────────────────── */
    .ui-topbar {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-4);
      padding: 0 var(--content-pad-r) 0 var(--content-pad-l);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .ui-topbar-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      min-width: 0;
    }
    .ui-topbar-eyebrow {
      font-size: var(--fs-label);
      line-height: var(--lh-label);
      letter-spacing: var(--ls-label);
      color: var(--text-subtle);
      text-transform: uppercase;
      font-weight: var(--fw-medium);
    }
    .ui-topbar-sep {
      color: var(--text-disabled);
      font-size: var(--fs-body);
    }
    .ui-topbar-title {
      font-size: var(--fs-title);
      line-height: var(--lh-title);
      letter-spacing: var(--ls-title);
      font-weight: var(--fw-semibold);
      color: var(--text);
    }
    .ui-topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    /* ════════════════════════════════════════════════════════════════════════
       PAGE / PRIMITIVES
       ════════════════════════════════════════════════════════════════════════ */
    .ui-page {
      padding: var(--sp-6) var(--content-pad-r) var(--sp-10) var(--content-pad-l);
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
    }

    .ui-pageheader {
      padding: var(--sp-2) 0 var(--sp-4);
    }
    .ui-pageheader-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-5);
    }
    .ui-pageheader-text { min-width: 0; }
    .ui-pageheader-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: var(--fs-label);
      line-height: var(--lh-label);
      letter-spacing: var(--ls-label);
      color: var(--text-subtle);
      text-transform: uppercase;
      font-weight: var(--fw-medium);
    }
    .ui-pageheader-title {
      margin-top: var(--sp-2);
      font-size: var(--fs-display);
      line-height: var(--lh-display);
      letter-spacing: var(--ls-display);
      font-weight: var(--fw-semibold);
      color: var(--text);
    }
    .ui-pageheader-lede {
      margin-top: var(--sp-1);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--text-muted);
      max-width: 68ch;
    }
    .ui-pageheader-actions {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      flex-shrink: 0;
      margin-top: var(--sp-1);
    }
    .ui-pageheader-badges {
      margin-top: var(--sp-3);
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
    }

    /* Stats row — full-width grid below page header */
    .ui-stats-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--sp-3);
    }
    @media (max-width: 1180px) { .ui-stats-row { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px)  { .ui-stats-row { grid-template-columns: minmax(0, 1fr); } }

    /* Stats row at 3 columns (e.g. Servers & Cache) */
    .ui-stats-row[data-cols="3"] { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    @media (max-width: 1080px) { .ui-stats-row[data-cols="3"] { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

    /* ── Card ──────────────────────────────────────────────────────────────── */
    .ui-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-3);
    }
    .ui-card[data-variant="soft"] {
      background: var(--surface-2);
      border-color: var(--border);
    }
    .ui-card[data-variant="bare"] {
      background: transparent;
      border: 1px dashed var(--border);
    }
    .ui-card-pad     { padding: var(--sp-5); }
    .ui-card-pad-sm  { padding: var(--sp-3); }

    /* ── Section — card with header strip + body ──────────────────────────── */
    .ui-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-3);
      overflow: hidden;
    }
    .ui-section-head {
      padding: var(--sp-3) var(--sp-5);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-4);
      background: var(--surface);
    }
    .ui-section-lead { display: flex; align-items: flex-start; gap: var(--sp-3); min-width: 0; }
    .ui-section-title {
      font-size: var(--fs-title);
      line-height: var(--lh-title);
      letter-spacing: var(--ls-title);
      font-weight: var(--fw-semibold);
      color: var(--text);
    }
    .ui-section-copy {
      margin-top: 2px;
      max-width: 64ch;
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--text-muted);
    }
    .ui-section-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      flex-shrink: 0;
    }
    .ui-section-body { padding: var(--sp-5); }
    .ui-section-body-flush { padding: 0; }

    /* ── Stat tile ─────────────────────────────────────────────────────────── */
    .ui-stat {
      padding: var(--sp-4) var(--sp-5);
      border: 1px solid var(--border);
      border-radius: var(--r-3);
      background: var(--surface);
      min-height: 92px;
    }
    .ui-stat-label {
      font-size: var(--fs-label);
      line-height: var(--lh-label);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--text-subtle);
      font-weight: var(--fw-medium);
    }
    .ui-stat-value {
      margin-top: var(--sp-2);
      font-size: var(--fs-h2);
      line-height: var(--lh-h2);
      letter-spacing: var(--ls-h2);
      font-weight: var(--fw-semibold);
      color: var(--text);
      font-feature-settings: 'tnum';
      font-variant-numeric: tabular-nums;
    }
    .ui-stat-sub {
      margin-top: var(--sp-1);
      font-size: var(--fs-small);
      line-height: var(--lh-small);
      color: var(--text-subtle);
    }
    .ui-stat-trend {
      margin-top: var(--sp-2);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: var(--fs-label);
    }

    /* Mini stat (inside sections) */
    .ui-ministat {
      padding: var(--sp-3) var(--sp-4);
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface-2);
    }
    .ui-ministat-label {
      font-size: var(--fs-label);
      line-height: var(--lh-label);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--text-subtle);
      font-weight: var(--fw-medium);
    }
    .ui-ministat-value {
      margin-top: var(--sp-1);
      font-size: 16px;
      line-height: 22px;
      letter-spacing: -0.01em;
      font-weight: var(--fw-semibold);
      color: var(--text);
      font-feature-settings: 'tnum';
      font-variant-numeric: tabular-nums;
    }
    .ui-ministat-sub {
      margin-top: 2px;
      font-size: var(--fs-small);
      color: var(--text-subtle);
    }

    /* ── Button ────────────────────────────────────────────────────────────── */
    .ui-btn {
      --_h: var(--btn-h-md);
      --_pad-x: 12px;
      --_fs: var(--fs-body);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-1);
      height: var(--_h);
      padding: 0 var(--_pad-x);
      font-size: var(--_fs);
      font-family: inherit;
      font-weight: var(--fw-medium);
      letter-spacing: -0.003em;
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }
    .ui-btn:hover { background: var(--surface-3); border-color: var(--border-strong); }
    .ui-btn:active { background: var(--surface-3); }
    .ui-btn[disabled], .ui-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .ui-btn[data-variant="primary"] {
      background: var(--accent);
      color: var(--text-on-accent);
      border-color: transparent;
      font-weight: var(--fw-semibold);
    }
    .ui-btn[data-variant="primary"]:hover { background: var(--accent-hover); }
    .ui-btn[data-variant="primary"]:active { background: var(--accent-active); }

    .ui-btn[data-variant="ghost"] {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
    }
    .ui-btn[data-variant="ghost"]:hover { background: var(--surface-2); color: var(--text); border-color: transparent; }

    .ui-btn[data-variant="destructive"] {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: var(--danger-border);
    }
    .ui-btn[data-variant="destructive"]:hover { background: rgba(239, 68, 68, 0.18); }

    .ui-btn[data-size="sm"]  { --_h: var(--btn-h-sm); --_pad-x: 10px; --_fs: var(--fs-body); }
    .ui-btn[data-block="true"] { width: 100%; }
    .ui-btn[data-icon="true"]  { width: var(--_h); padding: 0; }

    .ui-icon-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--r-2);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
    }
    .ui-icon-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }

    /* ── Input / Select / Textarea ────────────────────────────────────────── */
    .ui-input,
    .ui-textarea,
    .ui-select {
      width: 100%;
      height: var(--input-h);
      padding: 0 12px;
      font-family: inherit;
      font-size: var(--fs-body);
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      outline: none;
      transition: border-color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease);
    }
    .ui-input::placeholder, .ui-textarea::placeholder { color: var(--text-disabled); }
    .ui-input:hover, .ui-textarea:hover, .ui-select:hover { border-color: var(--border-strong); }
    .ui-input:focus, .ui-textarea:focus, .ui-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-ring);
    }
    .ui-textarea { height: auto; padding: 8px 12px; min-height: 96px; resize: vertical; line-height: var(--lh-body); }
    .ui-select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none'><path d='M4 6l4 4 4-4' stroke='%239aa3ad' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 14px;
      padding-right: 32px;
    }
    .ui-input-icon { position: relative; }
    .ui-input-icon > .ui-input-icon-affix {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      pointer-events: none;
      color: var(--text-subtle);
    }
    .ui-input-icon > .ui-input { padding-left: 32px; }

    /* Trailing kbd hint */
    .ui-input-kbd {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: var(--r-1);
      background: var(--surface);
      color: var(--text-subtle);
      font-family: var(--font-mono);
      font-size: 10.5px;
      pointer-events: none;
    }

    /* ── Label / Hint / Help ───────────────────────────────────────────────── */
    .ui-label {
      font-size: var(--fs-label);
      line-height: var(--lh-label);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--text-subtle);
      font-weight: var(--fw-medium);
    }
    .ui-label-strong {
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      color: var(--text);
    }
    .ui-hint { font-size: var(--fs-small); color: var(--text-subtle); line-height: var(--lh-small); }
    .ui-help { font-size: var(--fs-small); color: var(--text-muted); line-height: 1.5; margin-top: 4px; }

    /* ── Badge / Chip ──────────────────────────────────────────────────────── */
    .ui-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 20px;
      padding: 0 8px;
      border-radius: var(--r-pill);
      font-size: var(--fs-small);
      font-weight: var(--fw-medium);
      letter-spacing: 0;
      white-space: nowrap;
      line-height: 1;
    }
    .ui-badge[data-tone="default"]  { background: var(--surface-3); color: var(--text-muted); }
    .ui-badge[data-tone="primary"]  { background: var(--accent-soft); color: var(--accent); }
    .ui-badge[data-tone="success"]  { background: var(--success-soft); color: var(--success); }
    .ui-badge[data-tone="warning"]  { background: var(--warning-soft); color: var(--warning); }
    .ui-badge[data-tone="danger"]   { background: var(--danger-soft); color: var(--danger); }
    .ui-badge[data-tone="info"]     { background: var(--info-soft); color: var(--info); }
    .ui-badge[data-outline="true"]  { background: transparent; border: 1px solid currentColor; }

    .ui-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 22px;
      padding: 0 8px;
      border-radius: var(--r-1);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: var(--fs-small);
      font-weight: var(--fw-medium);
      line-height: 1;
    }
    .ui-chip-strong { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }

    /* ── Toggle group (segmented pills) ────────────────────────────────────── */
    .ui-toggle-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface-2);
    }
    .ui-toggle-pill {
      height: 24px;
      padding: 0 10px;
      border-radius: var(--r-1);
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      cursor: pointer;
      font-family: inherit;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
      white-space: nowrap;
    }
    .ui-toggle-pill:hover { background: var(--surface-3); color: var(--text); }
    .ui-toggle-pill[data-active="true"] {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 0 0 1px var(--border-strong);
    }

    /* Toggle group bare (used when single chip outside a track) */
    .ui-toggle-group[data-bare="true"] {
      padding: 0;
      border: none;
      background: transparent;
    }
    .ui-toggle-group[data-bare="true"] .ui-toggle-pill {
      height: 26px;
      padding: 0 10px;
      border-radius: var(--r-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .ui-toggle-group[data-bare="true"] .ui-toggle-pill:hover { background: var(--surface-3); }
    .ui-toggle-group[data-bare="true"] .ui-toggle-pill[data-active="true"] {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent);
      box-shadow: none;
    }

    /* ── Tabs (Linear-style underline) ─────────────────────────────────────── */
    .ui-tabs {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .ui-tabs::-webkit-scrollbar { display: none; }
    .ui-tab {
      position: relative;
      height: 38px;
      padding: 0 var(--sp-4);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      white-space: nowrap;
      transition: color var(--dur-fast) var(--ease);
    }
    .ui-tab > svg { color: currentColor; }
    .ui-tab:hover { color: var(--text); }
    .ui-tab[data-active="true"] { color: var(--text); }
    .ui-tab[data-active="true"]::after {
      content: '';
      position: absolute;
      left: var(--sp-2);
      right: var(--sp-2);
      bottom: -1px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    /* ── Separator ─────────────────────────────────────────────────────────── */
    .ui-separator {
      height: 1px;
      width: 100%;
      background: var(--border);
      border: none;
    }
    .ui-separator[data-vertical="true"] { width: 1px; height: 100%; align-self: stretch; }

    /* ── Table ─────────────────────────────────────────────────────────────── */
    .ui-table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    .ui-table thead th {
      position: sticky;
      top: 0;
      text-align: left;
      padding: var(--sp-2) var(--sp-4);
      height: 32px;
      font-size: var(--fs-label);
      font-weight: var(--fw-medium);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--text-subtle);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .ui-table td {
      padding: var(--sp-2) var(--sp-4);
      height: var(--row-h);
      font-size: var(--fs-body);
      color: var(--text);
      border-bottom: 1px solid var(--border-subtle);
    }
    .ui-table tbody tr {
      transition: background var(--dur-fast) var(--ease);
    }
    .ui-table tbody tr.ui-row-clickable { cursor: pointer; }
    .ui-table tbody tr.ui-row-clickable:hover { background: var(--surface-2); }
    .ui-table tbody tr:last-child td { border-bottom: none; }

    /* ── Dot (status) ──────────────────────────────────────────────────────── */
    .ui-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ui-dot[data-tone="success"] { background: var(--success); box-shadow: 0 0 0 3px var(--success-soft); }
    .ui-dot[data-tone="danger"]  { background: var(--danger);  box-shadow: 0 0 0 3px var(--danger-soft); }
    .ui-dot[data-tone="warning"] { background: var(--warning); box-shadow: 0 0 0 3px var(--warning-soft); }
    .ui-dot[data-tone="muted"]   { background: var(--text-disabled); }

    /* ── Icon shell (small, only for section heads) ────────────────────────── */
    .ui-icon-shell {
      width: 24px;
      height: 24px;
      border-radius: var(--r-1);
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
      background: var(--surface-3);
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .ui-icon-shell[data-tone="success"] { color: var(--success); }
    .ui-icon-shell[data-tone="warning"] { color: var(--warning); }
    .ui-icon-shell[data-tone="danger"]  { color: var(--danger); }
    .ui-icon-shell[data-tone="info"]    { color: var(--info); }
    .ui-icon-shell[data-tone="muted"]   { color: var(--text-muted); }
    .ui-icon-shell[data-size="lg"]      { width: 32px; height: 32px; border-radius: var(--r-2); }

    /* ── KeyValue rows ─────────────────────────────────────────────────────── */
    .ui-kv {
      display: flex;
      flex-direction: column;
    }
    .ui-kv-row {
      display: grid;
      grid-template-columns: minmax(140px, 200px) minmax(0, 1fr);
      gap: var(--sp-5);
      padding: var(--sp-3) 0;
      border-top: 1px solid var(--border-subtle);
    }
    .ui-kv-row:first-child { border-top: none; padding-top: 0; }
    .ui-kv-row:last-child  { padding-bottom: 0; }
    .ui-kv-label {
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      color: var(--text);
    }
    .ui-kv-hint {
      margin-top: 2px;
      font-size: var(--fs-small);
      line-height: 1.5;
      color: var(--text-subtle);
    }
    .ui-kv-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-3);
      min-width: 0;
    }
    .ui-kv-value {
      min-width: 0;
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--text);
    }

    /* ── Empty / Spinner / Feedback ────────────────────────────────────────── */
    .ui-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      padding: var(--sp-8) var(--sp-6);
      color: var(--text-subtle);
      text-align: center;
    }
    .ui-spinner-wrap { display: flex; align-items: center; justify-content: center; padding: var(--sp-7); }

    .ui-feedback {
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--r-2);
      border: 1px solid transparent;
      font-size: var(--fs-body);
      line-height: var(--lh-body);
    }
    .ui-feedback[data-tone="success"] { background: var(--success-soft); border-color: var(--success-border); color: var(--success); }
    .ui-feedback[data-tone="danger"]  { background: var(--danger-soft);  border-color: var(--danger-border);  color: var(--danger); }
    .ui-feedback[data-tone="warning"] { background: var(--warning-soft); border-color: var(--warning-border); color: var(--warning); }
    .ui-feedback[data-tone="info"]    { background: var(--accent-soft);  border-color: var(--accent-border);  color: var(--text); }

    .ui-banner {
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--r-2);
      border: 1px solid var(--accent-border);
      background: var(--accent-soft);
      color: var(--text);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
    }
    .ui-banner[data-tone="warning"] { border-color: var(--warning-border); background: var(--warning-soft); }

    /* ── Inline card / List item ───────────────────────────────────────────── */
    .ui-inline {
      padding: var(--sp-3) var(--sp-4);
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface-2);
    }

    .ui-list { display: flex; flex-direction: column; }
    .ui-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--border-subtle);
    }
    .ui-list-item:last-child { border-bottom: none; }
    .ui-list-item-flat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      padding: var(--sp-2) 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .ui-list-item-flat:last-child { border-bottom: none; }

    /* ── Code block ────────────────────────────────────────────────────────── */
    .ui-code {
      padding: var(--sp-3) var(--sp-4);
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface-2);
      font-family: var(--font-mono);
      font-size: var(--fs-mono-sm);
      line-height: var(--lh-mono-sm);
      color: var(--text);
      overflow-x: auto;
      white-space: pre;
      max-height: 460px;
    }

    /* ── Note / Step ───────────────────────────────────────────────────────── */
    .ui-notes { display: flex; flex-direction: column; gap: var(--sp-2); }
    .ui-note {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface);
    }
    .ui-note-dot {
      margin-top: 7px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .ui-note-copy {
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--text-muted);
    }

    .ui-steps {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }
    .ui-step {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-3);
    }
    .ui-step-num {
      width: 20px;
      height: 20px;
      border-radius: var(--r-1);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      font-size: 10.5px;
      font-weight: var(--fw-semibold);
      flex-shrink: 0;
      font-family: var(--font-mono);
    }
    .ui-step-copy { font-size: var(--fs-body); line-height: var(--lh-body); color: var(--text-muted); }

    /* ── Dialog ────────────────────────────────────────────────────────────── */
    .ui-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 60;
      padding: var(--sp-5);
    }
    .ui-dialog {
      width: 100%;
      max-height: 86vh;
      overflow: auto;
      border-radius: var(--r-3);
      background: var(--surface);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-dialog);
    }
    .ui-dialog-head {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-4);
      padding: var(--sp-4) var(--sp-5);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 1;
    }
    .ui-dialog-title {
      font-size: var(--fs-title);
      line-height: var(--lh-title);
      font-weight: var(--fw-semibold);
    }
    .ui-dialog-sub {
      margin-top: 2px;
      font-size: var(--fs-small);
      color: var(--text-subtle);
    }
    .ui-dialog-close {
      width: 24px;
      height: 24px;
      border-radius: var(--r-1);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }
    .ui-dialog-close:hover { background: var(--surface-2); color: var(--text); }
    .ui-dialog-body { padding: var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-3); }

    /* ── Status pill (top-bar refresh indicator) ──────────────────────────── */
    .ui-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 24px;
      padding: 0 10px;
      border-radius: var(--r-pill);
      font-size: var(--fs-small);
      font-weight: var(--fw-medium);
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    /* ── Login ─────────────────────────────────────────────────────────────── */
    .ui-login {
      width: 100%;
      max-width: 360px;
      padding: var(--sp-6);
      border-radius: var(--r-3);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-dialog);
    }

    /* ── Server card (collapsible) ─────────────────────────────────────────── */
    .ui-server {
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface-2);
      transition: border-color var(--dur-fast) var(--ease);
    }
    .ui-server:hover { border-color: var(--border-strong); }
    .ui-server-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-4);
      padding: var(--sp-3) var(--sp-4);
      cursor: pointer;
    }
    .ui-server-body {
      padding: var(--sp-4);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    /* ── Bucket meter ──────────────────────────────────────────────────────── */
    .ui-meter {
      height: 4px;
      width: 100%;
      border-radius: var(--r-pill);
      background: var(--surface-3);
      overflow: hidden;
    }
    .ui-meter-fill {
      height: 100%;
      border-radius: var(--r-pill);
      transition: width 0.4s var(--ease);
    }

    /* ── Trace card (Logs modal) ──────────────────────────────────────────── */
    .ui-trace {
      padding: var(--sp-3) var(--sp-4);
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface-2);
    }
    .ui-trace-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
      margin-bottom: var(--sp-2);
    }
    .ui-kv-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px var(--sp-4);
      font-size: var(--fs-body);
      color: var(--text-muted);
    }

    /* ── Policy result ────────────────────────────────────────────────────── */
    .ui-policy-result {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--r-2);
      border: 1px solid var(--border);
      background: var(--surface-2);
    }
    .ui-policy-result[data-tone="allowed"] { background: var(--success-soft); border-color: var(--success-border); }
    .ui-policy-result[data-tone="denied"]  { background: var(--danger-soft);  border-color: var(--danger-border); }
    .ui-policy-result-icon {
      width: 24px;
      height: 24px;
      border-radius: var(--r-1);
      flex-shrink: 0;
      display: grid;
      place-items: center;
    }
    .ui-policy-result[data-tone="allowed"] .ui-policy-result-icon { background: rgba(62, 207, 142, 0.20); color: var(--success); }
    .ui-policy-result[data-tone="denied"]  .ui-policy-result-icon { background: rgba(239, 68, 68, 0.22);  color: var(--danger); }

    /* ── Token chip (mono pill) ────────────────────────────────────────────── */
    .ui-token {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: var(--r-1);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: var(--fs-mono-sm);
    }

    /* ── Layout helpers ────────────────────────────────────────────────────── */
    .ui-grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(360px, 0.9fr);
      gap: var(--sp-4);
      align-items: start;
    }
    .ui-grid-2-equal {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--sp-3);
    }
    .ui-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--sp-3);
    }
    .ui-grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--sp-3);
    }
    .ui-stack    { display: flex; flex-direction: column; gap: var(--sp-4); }
    .ui-stack-sm { display: flex; flex-direction: column; gap: var(--sp-2); }
    .ui-stack-xs { display: flex; flex-direction: column; gap: 6px; }
    .ui-row { display: flex; align-items: center; gap: var(--sp-2); flex-wrap: wrap; }
    .ui-row-tight { display: flex; align-items: center; gap: var(--sp-1); flex-wrap: wrap; }
    .ui-row-between { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3); }

    .ui-rail-sticky { position: sticky; top: var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-4); }

    /* ── Registry card grid ────────────────────────────────────────────────── */
    .ui-registry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: var(--sp-3);
    }
    .ui-registry-card {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r-3);
      background: var(--surface);
      transition: border-color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
    }
    .ui-registry-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
    .ui-registry-card-title {
      font-size: 14px;
      font-weight: var(--fw-semibold);
      letter-spacing: -0.005em;
      color: var(--text);
      line-height: 1.3;
    }
    .ui-registry-card-desc {
      font-size: 12.5px;
      line-height: 1.45;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ui-registry-card-meta {
      font-size: 11px;
      color: var(--text-subtle);
      word-break: break-word;
    }

    /* Install bar — compact target/scope/profile */
    .ui-install-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      flex-wrap: wrap;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-3);
      background: var(--surface-2);
    }
    .ui-install-bar-label {
      font-size: var(--fs-label);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--text-subtle);
      font-weight: var(--fw-medium);
      flex-shrink: 0;
    }

    /* ── Typography helpers ────────────────────────────────────────────────── */
    .ui-mono {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }
    .ui-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ui-link {
      color: var(--accent);
      transition: color var(--dur-fast) var(--ease);
    }
    .ui-link:hover { color: var(--accent-hover); text-decoration: underline; }

    /* Duration tones */
    .ui-dur-fast   { color: var(--success); }
    .ui-dur-medium { color: var(--warning); }
    .ui-dur-slow   { color: var(--danger); }
    .ui-dur-none   { color: var(--text-subtle); }

    /* ── Hamburger button (mobile only) ───────────────────────────────────── */
    .ui-hamburger {
      display: none;
      width: 32px;
      height: 32px;
      border-radius: var(--r-2);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ui-hamburger:hover { background: var(--surface-3); color: var(--text); }
    .ui-mobile-scrim {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 49;
    }

    /* ════════════════════════════════════════════════════════════════════════
       RESPONSIVE
       ════════════════════════════════════════════════════════════════════════ */

    /* ≤ 1180px — collapse 2-col grids; rail goes below; sidebar still full */
    @media (max-width: 1180px) {
      .ui-grid-2 { grid-template-columns: minmax(0, 1fr); }
      .ui-grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .ui-rail-sticky { position: static; }
    }

    /* ≤ 1080px — sidebar collapses to icon-only (56px) */
    @media (max-width: 1080px) {
      :root { --sidebar-w: 56px; }
      .ui-sidebar { width: var(--sidebar-w); }
      .ui-sidebar-head { padding: var(--sp-3) var(--sp-2); display: flex; justify-content: center; }
      .ui-brand { gap: 0; }
      .ui-brand-name, .ui-brand-tag { display: none; }
      .ui-brand-mark { width: 32px; height: 32px; }
      .ui-nav { padding: var(--sp-3) var(--sp-1); align-items: center; }
      .ui-nav-section-label { display: none; }
      .ui-nav-section + .ui-nav-section {
        margin-top: var(--sp-2);
        padding-top: var(--sp-2);
      }
      .ui-nav-item {
        justify-content: center;
        padding: 0;
        width: 36px;
        height: 36px;
      }
      .ui-nav-item > span:not(.ui-nav-icon) { display: none; }
      .ui-nav-item[data-active="true"]::before {
        left: -1px;
        height: 18px;
      }
      .ui-sidebar-foot { display: none; }
    }

    /* ≤ 1080px — content padding tighter when sidebar collapses */
    @media (max-width: 1080px) and (min-width: 881px) {
      :root { --content-pad-l: 32px; --content-pad-r: 28px; }
    }

    /* ≤ 880px — denser content, single col grids */
    @media (max-width: 880px) {
      :root { --content-pad-l: 22px; --content-pad-r: 22px; --content-pad-x: 22px; }
      .ui-page { padding: var(--sp-4) var(--content-pad-r) var(--sp-9) var(--content-pad-l); gap: var(--sp-4); }
      .ui-pageheader-row { flex-direction: column; gap: var(--sp-3); align-items: stretch; }
      .ui-pageheader-actions { width: 100%; flex-wrap: wrap; }
      .ui-pageheader-title { font-size: 20px; line-height: 26px; }
      .ui-pageheader-lede { font-size: 12.5px; }
      .ui-grid-3 { grid-template-columns: minmax(0, 1fr); }
      .ui-grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .ui-grid-2-equal { grid-template-columns: minmax(0, 1fr); }
      .ui-section-head { flex-direction: column; align-items: stretch; gap: var(--sp-2); }
      .ui-section-meta { flex-wrap: wrap; }
      .ui-topbar { padding: 0 var(--content-pad-r) 0 var(--content-pad-l); }
      .ui-topbar-meta { gap: var(--sp-1); }
    }

    /* ≤ 640px — sidebar becomes drawer; hamburger in topbar */
    @media (max-width: 640px) {
      :root { --content-pad-l: 16px; --content-pad-r: 16px; --content-pad-x: 16px; }
      .ui-shell { position: relative; }
      .ui-stage { border-left: none; }
      .ui-sidebar {
        position: fixed;
        top: 0; bottom: 0; left: 0;
        width: 240px;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform var(--dur-base) var(--ease);
        border-right: 1px solid var(--border);
      }
      .ui-sidebar[data-mobile-open="true"] { transform: translateX(0); }
      .ui-sidebar[data-mobile-open="true"] ~ .ui-mobile-scrim { display: block; }
      /* Restore full labels inside drawer */
      .ui-sidebar { width: 240px; }
      .ui-sidebar-head { padding: var(--sp-4); display: block; }
      .ui-brand { gap: var(--sp-2); }
      .ui-brand-name, .ui-brand-tag { display: block; }
      .ui-nav { padding: var(--sp-3) var(--sp-2); align-items: stretch; }
      .ui-nav-section-label { display: block; }
      .ui-nav-item { width: 100%; height: 32px; justify-content: flex-start; padding: 0 var(--sp-2); }
      .ui-nav-item > span:not(.ui-nav-icon) { display: inline; }
      .ui-nav-item[data-active="true"]::before { left: -8px; height: 16px; }
      .ui-sidebar-foot { display: flex; }
      .ui-hamburger { display: inline-flex; }

      .ui-pageheader-title { font-size: 19px; line-height: 24px; }
      .ui-stats-row { gap: var(--sp-2); }
      .ui-stat { padding: var(--sp-3) var(--sp-4); min-height: auto; }
      .ui-stat-value { font-size: 16px; line-height: 22px; }
      .ui-section-body { padding: var(--sp-4); }
      .ui-section-head { padding: var(--sp-3) var(--sp-4); }
      .ui-card-pad { padding: var(--sp-4); }
      .ui-kv-row { grid-template-columns: minmax(0, 1fr); gap: var(--sp-1); }
      .ui-kv-main { flex-direction: column; align-items: flex-start; }
      .ui-topbar-eyebrow { display: none; }
      .ui-topbar-sep { display: none; }
      .ui-status-pill { display: none; }
    }
  </style>
</head>
<body>
  <div id="root" class="ui-app"></div>

  <script crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-/AfDwVDXNopzPvhxMPQ11y1OCpR6mVkWx47qzSwIiquvxkcMkZddEzDNtIOtfCpk" src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-QmqVPp2TamJIiWMRVS5zCohkQOfDf5hYDW2Es1Vq8p6KU/UNMfZlpTyqqvc7SDiW" src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>

  <script type="text/conduit-dashboard">
    const { useState, useEffect, useCallback, useRef, Fragment } = React;
    const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = window.Recharts;

    const REFRESH_MS = 5000;
    const API_BASE   = '/conduit';

    // ─── HTTP helpers ─────────────────────────────────────────────────────────
    async function apiFetch(path, adminKey, opts = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (adminKey) headers['Authorization'] = 'Bearer ' + adminKey;
      const res = await fetch(API_BASE + path, { ...opts, headers });
      if (res.status === 401) { const e = new Error('UNAUTHORIZED'); e.code = 401; throw e; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }
    async function apiDelete(path, adminKey) {
      const headers = { 'Content-Type': 'application/json', 'X-Conduit-Admin': 'true' };
      if (adminKey) headers['Authorization'] = 'Bearer ' + adminKey;
      const res = await fetch(API_BASE + path, { method: 'DELETE', headers });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }
    async function apiPost(path, adminKey, body) {
      const headers = { 'Content-Type': 'application/json', 'X-Conduit-Admin': 'true' };
      if (adminKey) headers['Authorization'] = 'Bearer ' + adminKey;
      const res = await fetch(API_BASE + path, { method: 'POST', headers, body: JSON.stringify(body) });
      if (res.status === 401) { const e = new Error('UNAUTHORIZED'); e.code = 401; throw e; }
      if (!res.ok) {
        let msg = 'HTTP ' + res.status;
        try { const err = await res.json(); if (err?.error) msg = err.error; } catch {}
        throw new Error(msg);
      }
      return res.json();
    }

    // ─── Formatters ───────────────────────────────────────────────────────────
    function fmt(n, dec=0) {
      if (n==null||isNaN(n)) return '—';
      if (n>=1e6) return (n/1e6).toFixed(1)+'M';
      if (n>=1e3) return (n/1e3).toFixed(1)+'K';
      return dec>0 ? n.toFixed(dec) : Math.round(n).toString();
    }
    function fmtPct(n)  { if(n==null||isNaN(n)) return '—'; return (n*100).toFixed(1)+'%'; }
    function fmtMs(n)   { if(n==null||isNaN(n)) return '—'; if(n>=1000) return (n/1000).toFixed(2)+'s'; return Math.round(n)+'ms'; }
    function fmtTime(t) { if(!t) return '—'; return new Date(t).toLocaleTimeString(); }
    function fmtDate(t) { if(!t) return '—'; const d=new Date(t); return d.toLocaleDateString()+' '+d.toLocaleTimeString(); }
    function fmtUp(s) {
      if(!s) return '—';
      const d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), ss=Math.floor(s%60);
      if(d>0) return d+'d '+h+'h';
      if(h>0) return h+'h '+m+'m';
      if(m>0) return m+'m '+ss+'s';
      return ss+'s';
    }
    function durTone(ms) {
      if (ms==null) return 'ui-dur-none';
      if (ms<100)   return 'ui-dur-fast';
      if (ms<500)   return 'ui-dur-medium';
      return 'ui-dur-slow';
    }

    // ─── Icons (Lucide-style — stroke 1.5, 16px default) ─────────────────────
    const I = {
      Grid:     ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
      List:     ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1" fill="currentColor" stroke="none"/></svg>,
      Server:   ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2.5" y="3" width="19" height="7" rx="1.6"/><rect x="2.5" y="14" width="19" height="7" rx="1.6"/><circle cx="6.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/><circle cx="6.5" cy="17.5" r="0.8" fill="currentColor" stroke="none"/></svg>,
      DB:       ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5.5" rx="8.5" ry="2.8"/><path d="M20.5 12c0 1.55-3.8 2.8-8.5 2.8s-8.5-1.25-8.5-2.8"/><path d="M3.5 5.5v13c0 1.55 3.8 2.8 8.5 2.8s8.5-1.25 8.5-2.8v-13"/></svg>,
      Gauge:    ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a9 9 0 0 1 6.7 15.1"/><path d="M5.3 18.1A9 9 0 0 1 12 3"/><path d="M12 12l3-3.5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg>,
      Shield:   ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 21s7.5-3.5 7.5-9.5V5L12 2 4.5 5v6.5C4.5 17.5 12 21 12 21z"/></svg>,
      Key:      ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="7.5" cy="14.5" r="4.5"/><line x1="11" y1="11" x2="20.5" y2="2.5"/><line x1="17" y1="6" x2="20.5" y2="9.5"/><line x1="14" y1="9" x2="17.5" y2="12.5"/></svg>,
      Refresh:  ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M22 4v6h-6"/><path d="M2 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.5-3.5L22 10M2 14l4 4.5A9 9 0 0 0 20.5 15"/></svg>,
      Check:    ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      X:        ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      ChevR:    ()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      ChevD:    ()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      Trash:    ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
      Search:   ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="7.5"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>,
      Plug:     ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3v6"/><path d="M15 3v6"/><path d="M6 9h12v3a6 6 0 0 1-12 0V9z"/><path d="M12 21v-6"/></svg>,
      Settings: ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="1.8"/><circle cx="15" cy="12" r="1.8"/><circle cx="11" cy="18" r="1.8"/></svg>,
      Conduit:  ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
      Copy:     ()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="11" height="11" rx="1.6"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>,
      Info:     ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9.2"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.8" fill="currentColor" stroke="none"/></svg>,
      Filter:   ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.5 10 19 14 21 14 12.5 22 3"/></svg>,
      Activity: ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    };

    // Recharts tooltip preset
    const TT = {
      contentStyle: {
        background: '#16191e',
        border: '1px solid #2a2f37',
        borderRadius: '8px',
        color: '#e6e8eb',
        fontSize: '12px',
        padding: '8px 12px',
        boxShadow: '0 4px 16px rgba(0,0,0,0.5)',
      },
      labelStyle: { color: '#9aa3ad', marginBottom: '2px' },
      cursor: { stroke: '#20242b', strokeWidth: 1 },
    };

    // ════════════════════════════════════════════════════════════════════════
    // PRIMITIVES
    // ════════════════════════════════════════════════════════════════════════

    function cn(...parts) {
      return parts.filter(Boolean).join(' ');
    }

    function Card({ children, variant, padded, className, ...rest }) {
      return (
        <div
          className={cn('ui-card', padded === true ? 'ui-card-pad' : padded === 'sm' ? 'ui-card-pad-sm' : '', className)}
          data-variant={variant || 'default'}
          {...rest}
        >
          {children}
        </div>
      );
    }

    function Section({ icon: Icon, tone, title, copy, meta, flush, children }) {
      return (
        <section className="ui-section">
          <header className="ui-section-head">
            <div className="ui-section-lead">
              {Icon && <div className="ui-icon-shell" data-tone={tone || 'info'}><Icon/></div>}
              <div style={{minWidth:0}}>
                <h2 className="ui-section-title">{title}</h2>
                {copy && <p className="ui-section-copy">{copy}</p>}
              </div>
            </div>
            {meta && <div className="ui-section-meta">{meta}</div>}
          </header>
          <div className={flush ? 'ui-section-body-flush' : 'ui-section-body'}>{children}</div>
        </section>
      );
    }

    function Button({ children, variant, size, block, icon, type, ...rest }) {
      return (
        <button
          type={type || 'button'}
          className="ui-btn"
          data-variant={variant || 'secondary'}
          data-size={size || 'md'}
          data-block={block ? 'true' : undefined}
          data-icon={icon ? 'true' : undefined}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function IconBtn({ children, label, ...rest }) {
      return (
        <button className="ui-icon-btn" title={label} aria-label={label} {...rest}>
          {children}
        </button>
      );
    }

    function Input({ icon: Icon, kbd, ...rest }) {
      if (!Icon && !kbd) return <input className="ui-input" {...rest}/>;
      return (
        <div className="ui-input-icon">
          {Icon && <span className="ui-input-icon-affix"><Icon/></span>}
          <input className="ui-input" {...rest}/>
          {kbd && <span className="ui-input-kbd">{kbd}</span>}
        </div>
      );
    }

    function Textarea(props) {
      return <textarea className="ui-textarea" {...props}/>;
    }

    function Select({ children, ...rest }) {
      return <select className="ui-select" {...rest}>{children}</select>;
    }

    function Label({ children, strong, ...rest }) {
      return <label className={strong ? 'ui-label-strong' : 'ui-label'} {...rest}>{children}</label>;
    }

    function Hint({ children })  { return <p className="ui-hint">{children}</p>; }
    function Help({ children })  { return <p className="ui-help">{children}</p>; }

    function Badge({ children, tone, outline }) {
      return (
        <span className="ui-badge" data-tone={tone || 'default'} data-outline={outline ? 'true' : undefined}>
          {children}
        </span>
      );
    }

    function Chip({ children, strong, className, ...rest }) {
      return (
        <span className={cn('ui-chip', strong ? 'ui-chip-strong' : '', className)} {...rest}>
          {children}
        </span>
      );
    }

    function StateBadge({ enabled, on='Enabled', off='Disabled', offTone='default' }) {
      return <Badge tone={enabled ? 'success' : offTone}>{enabled ? on : off}</Badge>;
    }

    function Separator({ vertical }) {
      return <hr className="ui-separator" data-vertical={vertical ? 'true' : undefined}/>;
    }

    function Dot({ tone, size }) {
      return <span className="ui-dot" data-tone={tone || 'success'} data-size={size}/>;
    }

    function HealthDot({ ok, size }) {
      return <Dot tone={ok ? 'success' : 'danger'} size={size}/>;
    }

    function Spinner() {
      return (
        <div className="ui-spinner-wrap">
          <svg className="anim-spin" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9.5" stroke="rgba(76, 194, 255, 0.18)" strokeWidth="2.5"/>
            <path d="M12 2.5a9.5 9.5 0 0 1 9.5 9.5" stroke="#4cc2ff" strokeWidth="2.5" strokeLinecap="round"/>
          </svg>
        </div>
      );
    }

    function Empty({ icon: Icon = I.Info, msg = 'No data' }) {
      return (
        <div className="ui-empty">
          <span style={{opacity:0.6, marginBottom:'4px'}}><Icon/></span>
          <p style={{fontSize:'13px'}}>{msg}</p>
        </div>
      );
    }

    function Feedback({ tone, children }) {
      if (!children) return null;
      return <div className="ui-feedback" data-tone={tone || 'info'}>{children}</div>;
    }

    function ErrorMsg({ err }) {
      if (!err) return null;
      return <Feedback tone="danger"><strong>Error: </strong>{err}</Feedback>;
    }

    function Notice({ msg }) {
      if (!msg) return null;
      return <Feedback tone="success">{msg}</Feedback>;
    }

    function Banner({ children, tone }) {
      return <div className="ui-banner" data-tone={tone}>{children}</div>;
    }

    function StatTile({ label, value, sub }) {
      return (
        <div className="ui-stat">
          <p className="ui-stat-label">{label}</p>
          <p className="ui-stat-value">{value}</p>
          {sub && <p className="ui-stat-sub">{sub}</p>}
        </div>
      );
    }

    function MiniStat({ label, value, sub, valueClass }) {
      return (
        <div className="ui-ministat">
          <p className="ui-ministat-label">{label}</p>
          <p className={cn('ui-ministat-value', 'ui-mono', valueClass)}>{value}</p>
          {sub && <p className="ui-ministat-sub">{sub}</p>}
        </div>
      );
    }

    function KeyValue({ label, hint, value, badge }) {
      return (
        <div className="ui-kv-row">
          <div>
            <p className="ui-kv-label">{label}</p>
            {hint && <p className="ui-kv-hint">{hint}</p>}
          </div>
          <div className="ui-kv-main">
            <div className="ui-kv-value">{value}</div>
            {badge && <div style={{flexShrink:0}}>{badge}</div>}
          </div>
        </div>
      );
    }

    function Tabs({ value, onChange, options }) {
      return (
        <div className="ui-tabs" role="tablist">
          {options.map(opt => (
            <button
              key={String(opt.value)}
              type="button"
              role="tab"
              className="ui-tab"
              data-active={value === opt.value ? 'true' : undefined}
              aria-selected={value === opt.value}
              onClick={() => onChange(opt.value)}
            >
              {opt.icon && <opt.icon/>}
              <span>{opt.label}</span>
              {opt.badge != null && opt.badge}
            </button>
          ))}
        </div>
      );
    }

    function ToggleGroup({ value, onChange, options, bare }) {
      return (
        <div className="ui-toggle-group" data-bare={bare ? 'true' : undefined}>
          {options.map(opt => (
            <button
              key={String(opt.value)}
              type="button"
              className="ui-toggle-pill"
              data-active={value === opt.value ? 'true' : undefined}
              onClick={()=>onChange(opt.value)}
            >
              {opt.label}
            </button>
          ))}
        </div>
      );
    }

    function ChoiceCard({ active, label, sub, onClick }) {
      return (
        <button
          type="button"
          onClick={onClick}
          className="ui-toggle-pill"
          data-active={active ? 'true' : undefined}
          style={{
            display:'block', textAlign:'left', height:'auto', padding:'10px 12px',
            borderRadius:'var(--r-2)',
            background: active ? 'var(--accent-soft)' : 'var(--surface-2)',
            border: '1px solid ' + (active ? 'var(--accent-border)' : 'var(--border)'),
            color: active ? 'var(--text)' : 'var(--text-muted)',
            boxShadow: 'none',
          }}
        >
          <span style={{display:'block', fontSize:'13px', fontWeight:600, color:'var(--text)'}}>{label}</span>
          {sub && <span style={{display:'block', marginTop:'2px', fontSize:'11px', color:'var(--text-subtle)', textTransform:'uppercase', letterSpacing:'0.04em'}}>{sub}</span>}
        </button>
      );
    }

    function Step({ num, children }) {
      return (
        <div className="ui-step">
          <span className="ui-step-num">{num}</span>
          <p className="ui-step-copy">{children}</p>
        </div>
      );
    }

    function Note({ children }) {
      return (
        <div className="ui-note">
          <span className="ui-note-dot"/>
          <p className="ui-note-copy">{children}</p>
        </div>
      );
    }

    function Dialog({ open, title, sub, onClose, children, maxWidth = 560 }) {
      if (!open) return null;
      return (
        <div className="ui-overlay anim-fade" onMouseDown={(e)=>{ if(e.target===e.currentTarget) onClose?.(); }}>
          <div className="ui-dialog anim-pop" style={{maxWidth: maxWidth+'px'}} role="dialog" aria-modal="true">
            <header className="ui-dialog-head">
              <div style={{minWidth:0}}>
                <p className="ui-dialog-title">{title}</p>
                {sub && <p className="ui-dialog-sub ui-mono">{sub}</p>}
              </div>
              {onClose && <button onClick={onClose} className="ui-dialog-close" aria-label="Close"><I.X/></button>}
            </header>
            <div className="ui-dialog-body">{children}</div>
          </div>
        </div>
      );
    }

    function Field({ label, hint, full, children }) {
      return (
        <div className="ui-stack-xs" style={full ? {gridColumn:'1 / -1'} : undefined}>
          <Label>{label}</Label>
          {children}
          {hint && <Help>{hint}</Help>}
        </div>
      );
    }

    function Ring({ pct, size = 80, sw = 6, color = '#3ecf8e' }) {
      const r = (size - sw) / 2;
      const circ = 2 * Math.PI * r;
      const dash = circ * Math.min(pct / 100, 1);
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255, 255, 255, 0.06)" strokeWidth={sw}/>
          <circle
            cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}
            style={{ transition: 'stroke-dasharray 0.5s var(--ease)' }}
          />
        </svg>
      );
    }

    function PageHeader({ kicker, kickerIcon: KickerIcon, title, lede, actions, badges }) {
      return (
        <header className="ui-pageheader anim-fade">
          <div className="ui-pageheader-row">
            <div className="ui-pageheader-text">
              {kicker && (
                <span className="ui-pageheader-eyebrow">
                  {KickerIcon && <KickerIcon/>}
                  <span>{kicker}</span>
                </span>
              )}
              <h1 className="ui-pageheader-title">{title}</h1>
              {lede && <p className="ui-pageheader-lede">{lede}</p>}
            </div>
            {actions && <div className="ui-pageheader-actions">{actions}</div>}
          </div>
          {badges && badges.length > 0 && <div className="ui-pageheader-badges">{badges}</div>}
        </header>
      );
    }

    function StatsRow({ children, cols }) {
      return <div className="ui-stats-row" data-cols={cols}>{children}</div>;
    }

    function Page({ children }) {
      return <div className="ui-page">{children}</div>;
    }

    function PageStepsRow({ children }) {
      return (
        <div className="ui-card ui-card-pad-sm">
          <div className="ui-steps">{children}</div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // VIEW · Overview
    // ════════════════════════════════════════════════════════════════════════
    function OverviewView({ adminKey, tick }) {
      const [health, setHealth]     = useState(null);
      const [stats, setStats]       = useState(null);
      const [circuits, setCircuits] = useState([]);
      const [spark, setSpark]       = useState([]);
      const [tools, setTools]       = useState([]);
      const [clients, setClients]   = useState([]);
      const [loading, setLoading]   = useState(true);

      useEffect(() => {
        let alive = true;
        async function load() {
          setLoading(true);
          try {
            const [h, s, ci] = await Promise.allSettled([
              apiFetch('/health', adminKey),
              apiFetch('/stats', adminKey),
              apiFetch('/circuits', adminKey),
            ]);
            if (!alive) return;
            if (h.status === 'fulfilled')  setHealth(h.value);
            if (s.status === 'fulfilled')  setStats(s.value);
            if (ci.status === 'fulfilled') setCircuits(ci.value.circuits || []);

            const now = new Date(), from = new Date(now - 30*60000).toISOString();
            const lr = await apiFetch('/logs?limit=2000&from=' + encodeURIComponent(from), adminKey);
            if (!alive) return;
            const logs = lr.logs || [];

            const bkts = {};
            for (let i = 0; i < 30; i++) {
              const t = new Date(now - (29 - i) * 60000);
              const k = t.getHours() + ':' + String(t.getMinutes()).padStart(2, '0');
              bkts[k] = { time: k, reqs: 0 };
            }
            for (const l of logs) {
              const d = new Date(l.timestamp);
              const k = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
              if (bkts[k]) bkts[k].reqs++;
            }
            setSpark(Object.values(bkts));

            const tc = {};
            for (const l of logs) if (l.tool_name) tc[l.tool_name] = (tc[l.tool_name] || 0) + 1;
            setTools(Object.entries(tc).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => ({ name, count })));

            const cc = {};
            for (const l of logs) if (l.client_id) cc[l.client_id] = (cc[l.client_id] || 0) + 1;
            setClients(Object.entries(cc).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => ({ name, count })));
          } catch (e) { console.error('[conduit]', e); }
          if (alive) setLoading(false);
        }
        load();
        return () => { alive = false; };
      }, [adminKey, tick]);

      const ab = health?.backends?.filter(b => b.healthy)?.length ?? 0;
      const tb = health?.backends?.length ?? 0;
      const rq = stats?.requests ?? {};
      const cs = stats?.cache ?? {};
      const overallHealthy = health?.status === 'ok';
      const hasTraffic = spark.some(b => b.reqs > 0);
      const hasCacheData = (cs.hits || 0) > 0 || (cs.misses || 0) > 0 || (cs.entries || 0) > 0;
      const errorTone = (rq.error_rate || 0) > 0.05 ? 'danger' : 'success';

      return (
        <Page>
          <PageHeader
            kicker="Observe"
            kickerIcon={I.Activity}
            title="Overview"
            lede="A live snapshot of throughput, latency, cache, and upstream health. Optimised for fast scanning before you drill into a specific concern."
            badges={[
              <Badge key="hs" tone={overallHealthy ? 'success' : 'warning'}>{overallHealthy ? 'All systems operational' : 'Gateway degraded'}</Badge>,
              <Badge key="bk" tone={ab === tb && tb > 0 ? 'success' : tb > 0 ? 'warning' : 'default'}>{ab}/{tb} backends healthy</Badge>,
              <Badge key="ch" tone={hasCacheData ? 'primary' : 'default'}>{fmtPct(cs.hitRate)} cache hit rate</Badge>,
              <Badge key="er" tone={errorTone}>{fmtPct(rq.error_rate)} error rate</Badge>,
              loading && <Badge key="rf" tone="default">Refreshing…</Badge>,
            ].filter(Boolean)}
          />

          <StatsRow>
            <StatTile label="Total Requests" value={fmt(rq.total_requests)} sub={`${fmt(rq.requests_per_minute, 2)} req/min`}/>
            <StatTile label="Avg Latency"    value={fmtMs(rq.avg_latency_ms)} sub={`p95 ${fmtMs(rq.p95_ms)} · p99 ${fmtMs(rq.p99_ms)}`}/>
            <StatTile label="Cache"          value={fmtPct(cs.hitRate)} sub={`${fmt(cs.entries)} entries · ${fmt(cs.hits)} hits`}/>
            <StatTile label="Uptime"         value={fmtUp(health?.uptime_seconds)} sub={health?.status === 'ok' ? 'process healthy' : 'requires attention'}/>
          </StatsRow>

          <div className="ui-grid-2">
            <Section
              icon={I.Activity}
              title="Traffic"
              copy="Last 30 minutes of requests and the tools absorbing them."
            >
              <div className="ui-grid-2-equal">
                <div className="ui-ministat">
                  <p className="ui-ministat-label" style={{marginBottom:'10px'}}>Requests / min</p>
                  {hasTraffic ? (
                    <ResponsiveContainer width="100%" height={140}>
                      <AreaChart data={spark} margin={{top:4,right:4,bottom:0,left:-24}}>
                        <defs>
                          <linearGradient id="grA" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="5%"  stopColor="#4cc2ff" stopOpacity={0.36}/>
                            <stop offset="95%" stopColor="#4cc2ff" stopOpacity={0}/>
                          </linearGradient>
                        </defs>
                        <XAxis dataKey="time" stroke="transparent" tick={{fontSize:10, fill:'#5f6770'}} interval={4}/>
                        <YAxis stroke="transparent" tick={{fontSize:10, fill:'#5f6770'}} width={28}/>
                        <Tooltip {...TT}/>
                        <Area type="monotone" dataKey="reqs" name="requests" stroke="#4cc2ff" fill="url(#grA)" strokeWidth={1.8} dot={false}/>
                      </AreaChart>
                    </ResponsiveContainer>
                  ) : <Empty msg="No requests"/>}
                </div>
                <div className="ui-ministat">
                  <p className="ui-ministat-label" style={{marginBottom:'10px'}}>Top tools</p>
                  {tools.length > 0 ? (
                    <ResponsiveContainer width="100%" height={140}>
