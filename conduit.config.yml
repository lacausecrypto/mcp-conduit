# -------------------------------------------------------------
# PLUGINS
# Extend the gateway pipeline with custom middleware.
# Plugins hook into: before:request, after:auth, before:cache,
#   after:upstream, before:response.
# -------------------------------------------------------------
# plugins:
#   - name: "audit-logger"
#     path: "./plugins/audit-logger.js"    # Path to the JS/TS plugin file
#     hooks:                                # Hooks to activate for this plugin
#       - "after:auth"
#       - "before:response"
#     config:                               # Plugin-specific configuration (optional)
#       log_level: "info"
#       output_file: "/var/log/conduit-audit.log"


# -------------------------------------------------------------
# SERVICE DISCOVERY
# Allows MCP servers to self-register or be discovered
# automatically via HTTP heartbeat or DNS SRV records.
# -------------------------------------------------------------
# discovery:
#   enabled: true
#   poll_interval_seconds: 30    # How often to poll discovery backends (seconds)
#   stale_timeout_seconds: 90    # Remove servers with no heartbeat after this delay
#   default_cache:               # Default cache config for discovered servers
#     default_ttl: 120
#
#   backends:
#     # HTTP self-registration backend
#     # MCP servers POST to /conduit/discover/register as a heartbeat.
#     - type: http
#
#     # DNS SRV backend
#     # Discovers servers via DNS SRV records (e.g., _mcp._tcp.services.local)
#     - type: dns
#       domain: "_mcp._tcp.services.local"
